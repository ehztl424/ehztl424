<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>태준실험실 - 전문 자료관리시스템</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="importmap">
    {
      "imports": {
        "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
        "firebase/auth": "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"
      }
    }
  </script>
</head>
<body class="bg-[#f8fafc] text-slate-800">
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    import { initializeApp } from 'firebase/app';
    import { getAuth, onAuthStateChanged, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut } from 'firebase/auth';
    import { getFirestore, collection, onSnapshot, doc, setDoc, deleteDoc, addDoc, query, orderBy } from 'firebase/firestore';

    const { useState, useEffect, useRef } = React;

    // --- 아이콘 ---
    const Beaker = ({size=24, color="currentColor"}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M4.5 3h15"/><path d="M6 3v16a2 2 0 0 0 2 2h8a2 2 0 0 0 2-2V3"/><path d="M6 14h12"/></svg>;
    const FileText = ({size=20}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><line x1="10" y1="9" x2="8" y2="9"/></svg>;
    const ExternalLink = ({size=18}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>;
    const LogOut = ({size=18}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" x2="9" y1="12" y2="12"/></svg>;
    const Trash = ({size=18}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>;
    const Plus = ({size=18}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>;

    // --- Firebase 설정 ---
    const firebaseConfig = {
      apiKey: "AIzaSyCfHF_0xj-9qdD-VcwDCv_gJtQhDtmvSXQ",
      authDomain: "taejun-lab.firebaseapp.com",
      projectId: "taejun-lab",
      storageBucket: "taejun-lab.firebasestorage.app",
      messagingSenderId: "1064401778915",
      appId: "1:1064401778915:web:0cf6b5bf131c0c75276dd6"
    };
    
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const appId = 'taejun-lab';

    function App() {
      const [user, setUser] = useState(null);
      const [loading, setLoading] = useState(true);
      const [loginId, setLoginId] = useState('');
      const [loginPw, setLoginPw] = useState('');
      const [errorMsg, setErrorMsg] = useState('');

      const [activeTab, setActiveTab] = useState('archives');
      const [archives, setArchives] = useState([]);
      const [notes, setNotes] = useState([]);

      const [newFileName, setNewFileName] = useState('');
      const [newFileUrl, setNewFileUrl] = useState('');
      const [newNoteTitle, setNewNoteTitle] = useState('');
      const [newNoteContent, setNewNoteContent] = useState('');

      useEffect(() => {
        const unsub = onAuthStateChanged(auth, (u) => { setUser(u); setLoading(false); });
        return () => unsub();
      }, []);

      useEffect(() => {
        if (!user) return;
        const archivesRef = collection(db, 'artifacts', appId, 'users', user.uid, 'archives');
        const notesRef = collection(db, 'artifacts', appId, 'users', user.uid, 'notes');

        const unsubA = onSnapshot(archivesRef, (snap) => {
          setArchives(snap.docs.map(d => ({ id: d.id, ...d.data() })).sort((a,b)=>b.createdAt - a.createdAt));
        });
        const unsubN = onSnapshot(notesRef, (snap) => {
          setNotes(snap.docs.map(d => ({ id: d.id, ...d.data() })).sort((a,b)=>b.createdAt - a.createdAt));
        });

        return () => { unsubA(); unsubN(); };
      }, [user]);

      const handleLogin = async (e) => {
        e.preventDefault();
        setErrorMsg('');

        // 입력받은 ID를 시스템용 이메일로 변환
        const finalEmail = loginId.includes('@') ? loginId : `${loginId}@taejun.lab`;
        const finalPw = loginPw; // 이제 141592(6자리)이므로 그대로 사용 가능

        try {
          await signInWithEmailAndPassword(auth, finalEmail, finalPw);
        } catch (err) {
          try {
            await createUserWithEmailAndPassword(auth, finalEmail, finalPw);
          } catch (regErr) {
            setErrorMsg("접속 실패. 비밀번호를 다시 확인해 주세요.");
          }
        }
      };

      const addArchive = async (e) => {
        e.preventDefault();
        if(!newFileName || !newFileUrl) return;
        await addDoc(collection(db, 'artifacts', appId, 'users', user.uid, 'archives'), {
          name: newFileName, url: newFileUrl, createdAt: Date.now()
        });
        setNewFileName(''); setNewFileUrl('');
      };

      const addNote = async (e) => {
        e.preventDefault();
        if(!newNoteTitle.trim()) return;
        await addDoc(collection(db, 'artifacts', appId, 'users', user.uid, 'notes'), {
          title: newNoteTitle, content: newNoteContent, createdAt: Date.now()
        });
        setNewNoteTitle(''); setNewNoteContent('');
      };

      if (loading) return <div className="h-screen flex items-center justify-center font-bold text-blue-600">시스템 가동 중...</div>;

      if (!user) {
        return (
          <div className="min-h-screen bg-[#f0f2f5] flex items-center justify-center p-4">
            <div className="max-w-md w-full bg-white rounded-2xl shadow-2xl p-10 border border-gray-100">
              <div className="flex justify-center mb-6">
                <div className="p-3 bg-blue-600 rounded-2xl shadow-lg shadow-blue-200">
                  <Beaker size={36} color="white"/>
                </div>
              </div>
              <h1 className="text-2xl font-black text-center text-[#1e293b] mb-1">태준실험실</h1>
              <p className="text-center text-slate-400 mb-10 text-sm font-medium tracking-tight">자료관리시스템에 접속합니다</p>
              
              <form onSubmit={handleLogin} className="space-y-6">
                <div>
                  <label className="text-xs font-black text-slate-400 uppercase ml-1 tracking-widest">실험실 ID</label>
                  <input 
                    type="text" 
                    value={loginId} 
                    onChange={e=>setLoginId(e.target.value)} 
                    className="w-full border border-slate-200 rounded-xl p-4 mt-2 focus:ring-2 focus:ring-blue-500 outline-none transition-all font-semibold" 
                    placeholder="ID 입력 (ehztl424)"
                    required 
                  />
                </div>
                <div>
                  <label className="text-xs font-black text-slate-400 uppercase ml-1 tracking-widest">비밀번호</label>
                  <input 
                    type="password" 
                    value={loginPw} 
                    onChange={e=>setLoginPw(e.target.value)} 
                    className="w-full border border-slate-200 rounded-xl p-4 mt-2 focus:ring-2 focus:ring-blue-500 outline-none transition-all font-semibold tracking-[0.3em]" 
                    placeholder="••••••"
                    required 
                  />
                </div>
                {errorMsg && <p className="text-red-500 text-xs text-center font-bold bg-red-50 py-2 rounded-lg">{errorMsg}</p>}
                <button className="w-full bg-[#2563eb] hover:bg-[#1d4ed8] text-white font-black py-4 rounded-xl transition-all shadow-xl shadow-blue-100 text-lg">
                  시스템 로그인
                </button>
              </form>
            </div>
          </div>
        );
      }

      return (
        <div className="min-h-screen flex flex-col md:flex-row font-sans">
          {/* 사이드바 */}
          <aside className="w-full md:w-72 bg-[#1e293b] text-white p-6 flex flex-col shadow-2xl z-10">
            <div className="flex items-center gap-3 mb-12 px-2">
              <div className="p-2 bg-blue-600 rounded-xl shadow-lg shadow-blue-900/20"><Beaker size={26} color="white"/></div>
              <h1 className="text-xl font-black tracking-tight uppercase">Taejun <span className="text-blue-400">Lab</span></h1>
            </div>
            
            <nav className="flex-1 space-y-1.5">
              <button onClick={()=>setActiveTab('archives')} className={`w-full flex items-center gap-3 px-5 py-4 rounded-xl transition-all font-bold ${activeTab === 'archives' ? 'bg-blue-600 shadow-lg text-white' : 'text-slate-400 hover:bg-slate-800'}`}>
                <FileText size={20}/> <span>자료 보관소</span>
              </button>
              <button onClick={()=>setActiveTab('notes')} className={`w-full flex items-center gap-3 px-5 py-4 rounded-xl transition-all font-bold ${activeTab === 'notes' ? 'bg-blue-600 shadow-lg text-white' : 'text-slate-400 hover:bg-slate-800'}`}>
                <Beaker size={20} color="currentColor"/> <span>업무 일지</span>
              </button>
            </nav>

            <div className="mt-auto pt-6 border-t border-slate-700/50">
              <div className="flex items-center gap-3 px-3 mb-5">
                <div className="w-9 h-9 rounded-xl bg-blue-500/20 flex items-center justify-center text-blue-400 font-black text-xs border border-blue-500/20">TJ</div>
                <div className="text-xs text-slate-400 font-bold truncate flex-1 tracking-tight">{user.email.split('@')[0]}</div>
              </div>
              <button onClick={()=>signOut(auth)} className="w-full flex items-center justify-center gap-2 bg-slate-800/50 hover:bg-red-500/10 hover:text-red-400 text-slate-400 py-3.5 rounded-xl transition-all text-[10px] font-black uppercase tracking-widest border border-slate-700/50">
                <LogOut size={14}/> Log Out
              </button>
            </div>
          </aside>

          {/* 메인 영역 */}
          <main className="flex-1 p-6 md:p-12 overflow-y-auto bg-[#f8fafc]">
            {activeTab === 'archives' ? (
              <div className="max-w-5xl mx-auto">
                <div className="mb-10">
                  <h2 className="text-3xl font-black text-slate-800 tracking-tight">자료 보관소</h2>
                  <p className="text-slate-500 mt-2 font-semibold">클라우드에 등록된 주요 서류 및 링크입니다.</p>
                </div>

                <div className="bg-white rounded-[2rem] shadow-sm border border-slate-200/60 p-8 mb-10">
                  <h3 className="text-xs font-black text-slate-400 mb-6 uppercase tracking-[0.2em]">새 자료 등록</h3>
                  <form onSubmit={addArchive} className="flex flex-col md:flex-row gap-4">
                    <input type="text" placeholder="자료 명칭" value={newFileName} onChange={e=>setNewFileName(e.target.value)} className="flex-1 bg-slate-50 border border-slate-200 rounded-2xl px-5 py-4 focus:ring-2 focus:ring-blue-500 outline-none transition-all font-bold placeholder:text-slate-300" required />
                    <input type="url" placeholder="URL 링크 (드라이브 등)" value={newFileUrl} onChange={e=>setNewFileUrl(e.target.value)} className="flex-[2] bg-slate-50 border border-slate-200 rounded-2xl px-5 py-4 focus:ring-2 focus:ring-blue-500 outline-none transition-all font-bold placeholder:text-slate-300" required />
                    <button type="submit" className="bg-blue-600 hover:bg-blue-700 text-white font-black rounded-2xl px-8 py-4 transition-all shadow-xl shadow-blue-100 flex items-center justify-center gap-2">
                      <Plus size={20}/> 등록
                    </button>
                  </form>
                </div>

                <div className="bg-white rounded-[2rem] shadow-sm border border-slate-200/60 overflow-hidden">
                  <table className="w-full text-left">
                    <thead className="bg-slate-50/50 border-b border-slate-100">
                      <tr>
                        <th className="px-8 py-5 text-[10px] font-black text-slate-400 uppercase tracking-widest">파일명</th>
                        <th className="px-8 py-5 text-[10px] font-black text-slate-400 uppercase tracking-widest">등록일</th>
                        <th className="px-8 py-5 text-[10px] font-black text-slate-400 uppercase tracking-widest text-right">관리</th>
                      </tr>
                    </thead>
                    <tbody className="divide-y divide-slate-50">
                      {archives.map(item => (
                        <tr key={item.id} className="hover:bg-blue-50/30 transition-colors group">
                          <td className="px-8 py-6">
                            <div className="flex items-center gap-4">
                              <div className="p-3 bg-slate-100 rounded-xl text-slate-400 group-hover:bg-blue-100 group-hover:text-blue-600 transition-all"><FileText size={20}/></div>
                              <span className="font-bold text-slate-700">{item.name}</span>
                            </div>
                          </td>
                          <td className="px-8 py-6 text-sm text-slate-400 font-bold">{new Date(item.createdAt).toLocaleDateString()}</td>
                          <td className="px-8 py-6 text-right">
                            <div className="flex justify-end gap-3">
                              <a href={item.url} target="_blank" rel="noreferrer" className="flex items-center gap-2 text-blue-600 hover:text-white hover:bg-blue-600 font-bold text-sm bg-blue-50 px-5 py-2.5 rounded-xl transition-all border border-blue-100">
                                <ExternalLink size={14}/> 열기
                              </a>
                              <button onClick={()=>confirm("삭제하시겠습니까?") && deleteDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'archives', item.id))} className="text-slate-300 hover:text-red-500 p-2 transition-all">
                                <Trash size={20}/>
                              </button>
                            </div>
                          </td>
                        </tr>
                      ))}
                      {archives.length === 0 && <tr><td colSpan="3" className="px-8 py-32 text-center text-slate-300 font-bold italic">자료 보관함이 비어 있습니다.</td></tr>}
                    </tbody>
                  </table>
                </div>
              </div>
            ) : (
              <div className="max-w-5xl mx-auto">
                <div className="mb-10">
                  <h2 className="text-3xl font-black text-slate-800 tracking-tight">업무 일지</h2>
                  <p className="text-slate-500 mt-2 font-semibold">중요한 업무 메모와 연구 기록입니다.</p>
                </div>

                <div className="bg-white rounded-[2rem] shadow-sm border border-slate-200/60 p-8 mb-10">
                  <h3 className="text-xs font-black text-slate-400 mb-6 uppercase tracking-[0.2em]">새 일지 작성</h3>
                  <form onSubmit={addNote} className="space-y-4">
                    <input type="text" placeholder="일지 제목" value={newNoteTitle} onChange={e=>setNewNoteTitle(e.target.value)} className="w-full bg-slate-50 border border-slate-200 rounded-2xl px-6 py-4 focus:ring-2 focus:ring-blue-500 outline-none transition-all font-bold placeholder:text-slate-300" required />
                    <textarea placeholder="연구 내용을 기록하세요..." value={newNoteContent} onChange={e=>setNewNoteContent(e.target.value)} rows="5" className="w-full bg-slate-50 border border-slate-200 rounded-2xl px-6 py-4 focus:ring-2 focus:ring-blue-500 outline-none transition-all font-bold placeholder:text-slate-300 resize-none" />
                    <div className="flex justify-end">
                      <button type="submit" className="bg-blue-600 hover:bg-blue-700 text-white font-black rounded-2xl px-10 py-4 transition-all shadow-xl shadow-blue-100 flex items-center gap-2">
                        <Plus size={20}/> 일지 저장
                      </button>
                    </div>
                  </form>
                </div>

                <div className="grid gap-6 md:grid-cols-2">
                  {notes.map(note => (
                    <div key={note.id} className="bg-white border border-slate-200 rounded-3xl p-8 shadow-sm group hover:border-blue-200 transition-all">
                      <div className="flex justify-between items-start mb-4">
                        <h3 className="font-black text-slate-800 text-xl tracking-tight">{note.title}</h3>
                        <button onClick={()=>deleteDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'notes', note.id))} className="text-slate-200 hover:text-red-500 transition-all"><Trash size={18}/></button>
                      </div>
                      <p className="text-slate-500 leading-relaxed font-medium whitespace-pre-wrap mb-6">{note.content}</p>
                      <div className="text-[10px] font-black text-slate-300 uppercase tracking-widest">{new Date(note.createdAt).toLocaleString()}</div>
                    </div>
                  ))}
                </div>
              </div>
            )}
          </main>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
