<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>태준실험실 - 업무 통합 대시보드 (Google Drive)</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Babel -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <!-- Google API (Drive 연동을 위한 공식 스크립트) -->
  <script async defer src="https://apis.google.com/js/api.js"></script>
  <script async defer src="https://accounts.google.com/gsi/client"></script>
  
  <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "lucide-react": "https://esm.sh/lucide-react@0.294.0"
      }
    }
  </script>

  <style>
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes slideInLeft { from { transform: translateX(-100%); } to { transform: translateX(0); } }
    .animate-fadeIn { animation: fadeIn 0.3s ease-out forwards; }
    .animate-slideInLeft { animation: slideInLeft 0.3s ease-out forwards; }
    input:focus { outline: none; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    import React, { useState, useEffect, useRef, useCallback } from 'react';
    import { createRoot } from 'react-dom/client';
    import { 
      Microscope, FlaskConical, FileText, Users, Archive, CheckSquare, 
      Menu, X, Bell, Search, TrendingUp, Clock, AlertCircle, 
      Plus, MoreHorizontal, ChevronRight, Cloud, CloudOff, RefreshCw
    } from 'lucide-react';

    // =====================================================================
    // 👇👇 [여기에 발급받은 키를 입력하세요] 👇👇
    // =====================================================================
    const GOOGLE_CLIENT_ID = "여기에_클라이언트_ID를_붙여넣으세요"; 
    const GOOGLE_API_KEY = "여기에_API_키를_붙여넣으세요";
    // =====================================================================

    const DISCOVERY_DOC = 'https://www.googleapis.com/discovery/v1/apis/drive/v3/rest';
    const SCOPES = 'https://www.googleapis.com/auth/drive.file'; // 앱이 만든 파일만 접근하는 권한
    const DRIVE_FILE_NAME = "taejun_workspace_data.json";

    function App() {
      const [activeTab, setActiveTab] = useState('checklist');
      const [isMobileMenuOpen, setIsMobileMenuOpen] = useState(false);
      616527196791-gnisfc0coimun5gv2i2uukh7mn1ll22o.apps.googleusercontent.com
      // --- Google Drive 연동 상태 ---
      const [gapiLoaded, setGapiLoaded] = useState(false);
      const [isDriveConnected, setIsDriveConnected] = useState(false);
      const [isSyncing, setIsSyncing] = useState(false);
      const driveFileIdRef = useRef(null);
      const tokenClientRef = useRef(null);

      // --- 데이터 상태 (App 레벨에서 관리) ---
      const [weeks, setWeeks] = useState(() => {
        const stored = localStorage.getItem('workspace_weeks');
        return stored ? JSON.parse(stored) : [{ id: 'temp-1', title: '이번 주 진행사항', createdAt: Date.now() }];
      });
      const [blocksData, setBlocksData] = useState(() => {
        const stored = localStorage.getItem('workspace_blocks');
        return stored ? JSON.parse(stored) : {
          'temp-1': [
            { id: crypto.randomUUID(), type: 'h1', text: '구글 드라이브 연동 준비 완료!', completed: false },
            { id: crypto.randomUUID(), type: 'todo', text: '우측 상단의 구름 버튼을 눌러 로그인하세요.', completed: false },
          ]
        };
      });

      // 구글 API 스크립트 로드 확인
      useEffect(() => {
        const checkScripts = setInterval(() => {
          if (window.gapi && window.google) {
            clearInterval(checkScripts);
            // GAPI 초기화
            window.gapi.load('client', async () => {
              try {
                if(GOOGLE_API_KEY && GOOGLE_API_KEY !== "여기에_API_키를_붙여넣으세요"){
                  await window.gapi.client.init({
                    apiKey: GOOGLE_API_KEY,
                    discoveryDocs: [DISCOVERY_DOC],
                  });
                  setGapiLoaded(true);
                }
              } catch (e) { console.error("GAPI 초기화 에러:", e); }
            });
            // GIS (토큰 클라이언트) 초기화
            if(GOOGLE_CLIENT_ID && GOOGLE_CLIENT_ID !== "여기에_클라이언트_ID를_붙여넣으세요"){
              tokenClientRef.current = window.google.accounts.oauth2.initTokenClient({
                client_id: GOOGLE_CLIENT_ID,
                scope: SCOPES,
                callback: async (resp) => {
                  if (resp.error !== undefined) { throw (resp); }
                  setIsDriveConnected(true);
                  await downloadDataFromDrive();
                },
              });
            }
          }
        }, 500);
        return () => clearInterval(checkScripts);
      }, []);

      // 로컬 스토리지 상시 백업
      useEffect(() => {
        localStorage.setItem('workspace_weeks', JSON.stringify(weeks));
        localStorage.setItem('workspace_blocks', JSON.stringify(blocksData));
      }, [weeks, blocksData]);

      // 데이터가 변경될 때마다 구글 드라이브로 자동 저장 (디바운스 처리)
      useEffect(() => {
        if (!isDriveConnected || !driveFileIdRef.current) return;
        setIsSyncing(true);
        const timer = setTimeout(() => {
          uploadDataToDrive(weeks, blocksData);
        }, 3000); // 3초간 입력이 없으면 드라이브로 전송
        return () => clearTimeout(timer);
      }, [weeks, blocksData, isDriveConnected]);

      const handleDriveConnectClick = () => {
        if (!gapiLoaded || !tokenClientRef.current) {
          alert("구글 API 키와 클라이언트 ID를 코드에 입력하셨는지 확인해주세요!");
          return;
        }
        if (window.gapi.client.getToken() === null) {
          // 토큰 요청 팝업 띄우기
          tokenClientRef.current.requestAccessToken({prompt: 'consent'});
        } else {
          // 이미 토큰이 있으면 즉시 다운로드
          setIsDriveConnected(true);
          downloadDataFromDrive();
        }
      };

      // 드라이브에서 파일 찾기 및 불러오기
      const downloadDataFromDrive = async () => {
        setIsSyncing(true);
        try {
          const response = await window.gapi.client.drive.files.list({
            q: `name='${DRIVE_FILE_NAME}' and trashed=false`,
            fields: 'files(id, name)',
            spaces: 'drive',
          });
          const files = response.result.files;
          
          if (files && files.length > 0) {
            driveFileIdRef.current = files[0].id;
            // 파일 내용 다운로드
            const fileRes = await fetch(`https://www.googleapis.com/drive/v3/files/${files[0].id}?alt=media`, {
              headers: { 'Authorization': `Bearer ${window.gapi.client.getToken().access_token}` }
            });
            const data = await fileRes.json();
            if (data.weeks && data.blocksData) {
              setWeeks(data.weeks);
              setBlocksData(data.blocksData);
            }
          } else {
            // 파일이 없으면 새로 생성
            const createRes = await window.gapi.client.drive.files.create({
              resource: { name: DRIVE_FILE_NAME, mimeType: 'application/json' },
              fields: 'id'
            });
            driveFileIdRef.current = createRes.result.id;
            await uploadDataToDrive(weeks, blocksData); // 현재 로컬 데이터를 업로드
          }
        } catch (err) {
          console.error("드라이브 파일 로드 실패:", err);
          alert("파일을 불러오는데 실패했습니다. 팝업 차단을 해제해주세요.");
        } finally {
          setIsSyncing(false);
        }
      };

      // 드라이브로 파일 덮어쓰기 (저장)
      const uploadDataToDrive = async (currentWeeks, currentBlocks) => {
        if (!driveFileIdRef.current) return;
        const uploadData = { weeks: currentWeeks, blocksData: currentBlocks };
        try {
          await fetch(`https://www.googleapis.com/upload/drive/v3/files/${driveFileIdRef.current}?uploadType=media`, {
            method: 'PATCH',
            headers: {
              'Authorization': `Bearer ${window.gapi.client.getToken().access_token}`,
              'Content-Type': 'application/json'
            },
            body: JSON.stringify(uploadData)
          });
          console.log("구글 드라이브 동기화 완료");
        } catch (e) {
          console.error("구글 드라이브 저장 실패", e);
        } finally {
          setIsSyncing(false);
        }
      };

      // --- 네비게이션 및 컴포넌트들 ---
      const navigation = [
        { id: 'dashboard', name: '대시보드', icon: Microscope },
        { id: 'sales', name: '영업 관리', icon: TrendingUp },
        { id: 'bids', name: '입찰 리스트', icon: FileText },
        { id: 'team', name: '팀 진척도', icon: Users },
        { id: 'files', name: '파일 저장소', icon: Archive },
        { id: 'checklist', name: '체크리스트', icon: CheckSquare },
      ];

      const handleTabChange = (tabId) => {
        setActiveTab(tabId);
        setIsMobileMenuOpen(false);
      };

      // --- 체크리스트 컴포넌트 뷰 ---
      const ChecklistView = () => {
        const [activeWeekId, setActiveWeekId] = useState(weeks.length > 0 ? weeks[0].id : null);
        const inputRefs = useRef({});

        const activeBlocks = activeWeekId && blocksData[activeWeekId] 
            ? blocksData[activeWeekId] 
            : [{ id: crypto.randomUUID(), type: 'text', text: '', completed: false }];
            
        const activeWeekTitle = activeWeekId ? (weeks.find(w => w.id === activeWeekId)?.title || "제목 없음") : "";

        const updateActiveBlocks = (newBlocks) => {
          setBlocksData(prev => ({ ...prev, [activeWeekId]: newBlocks }));
        };

        const handleAddWeek = () => {
          const today = new Date();
          const newTitle = `${today.getMonth() + 1}월 ${Math.ceil(today.getDate() / 7)}주차`;
          const newId = crypto.randomUUID();
          const initBlock = [{ id: crypto.randomUUID(), type: 'text', text: '', completed: false }];
          
          setWeeks([{ id: newId, title: newTitle, createdAt: Date.now() }, ...weeks]);
          setBlocksData({ ...blocksData, [newId]: initBlock });
          setActiveWeekId(newId);
        };

        const handleTitleChange = (e) => {
          const newTitle = e.target.value;
          setWeeks(prev => prev.map(w => w.id === activeWeekId ? { ...w, title: newTitle } : w));
        };

        const handleBlockChange = (index, id, newText) => {
          const newBlocks = [...activeBlocks];
          let currentBlock = { ...newBlocks[index] };

          if (currentBlock.type === 'text') {
            if (newText === '[] ' || newText === '[ ] ') { currentBlock.type = 'todo'; currentBlock.text = ''; currentBlock.completed = false; }
            else if (newText === '[x] ' || newText === '[v] ') { currentBlock.type = 'todo'; currentBlock.text = ''; currentBlock.completed = true; }
            else if (newText === '> ') { currentBlock.type = 'toggle'; currentBlock.text = ''; }
            else if (newText === '- ') { currentBlock.type = 'bullet'; currentBlock.text = ''; }
            else if (newText === '# ') { currentBlock.type = 'h1'; currentBlock.text = ''; }
            else { currentBlock.text = newText; }
          } else { currentBlock.text = newText; }

          newBlocks[index] = currentBlock;
          updateActiveBlocks(newBlocks);
        };

        const handleKeyDown = (e, index, id) => {
          if (e.key === 'Enter') {
            e.preventDefault();
            const newBlocks = [...activeBlocks];
            const newId = crypto.randomUUID();
            const nextType = newBlocks[index].type === 'todo' ? 'todo' : 'text';
            newBlocks.splice(index + 1, 0, { id: newId, type: nextType, text: '', completed: false });
            updateActiveBlocks(newBlocks);
            setTimeout(() => { if (inputRefs.current[newId]) inputRefs.current[newId].focus(); }, 50);
          } 
          else if (e.key === 'Backspace' && activeBlocks[index].text === '') {
            if (activeBlocks[index].type !== 'text') {
              e.preventDefault();
              const newBlocks = [...activeBlocks];
              newBlocks[index].type = 'text';
              updateActiveBlocks(newBlocks);
            } else if (activeBlocks.length > 1) {
              e.preventDefault();
              const newBlocks = [...activeBlocks];
              newBlocks.splice(index, 1);
              updateActiveBlocks(newBlocks);
              const prevId = newBlocks[index - 1] ? newBlocks[index - 1].id : newBlocks[0].id;
              setTimeout(() => { if (inputRefs.current[prevId]) inputRefs.current[prevId].focus(); }, 50);
            }
          }
          else if (e.key === 'ArrowUp' && index > 0) { e.preventDefault(); inputRefs.current[activeBlocks[index - 1].id]?.focus(); }
          else if (e.key === 'ArrowDown' && index < activeBlocks.length - 1) { e.preventDefault(); inputRefs.current[activeBlocks[index + 1].id]?.focus(); }
        };

        const toggleTodoCompleted = (index) => {
          const newBlocks = [...activeBlocks];
          newBlocks[index].completed = !newBlocks[index].completed;
          updateActiveBlocks(newBlocks);
        };

        const renderBlockIcon = (block, index) => {
          if (block.type === 'todo') {
            return (
              <button onClick={() => toggleTodoCompleted(index)} 
                className={`mr-2 mt-1 w-5 h-5 flex-shrink-0 flex items-center justify-center border rounded hover:bg-slate-50 transition-colors ${block.completed ? 'border-sky-500 bg-sky-500' : 'border-slate-300 bg-transparent'}`}>
                {block.completed && <CheckSquare size={14} color="white" />}
              </button>
            );
          }
          if (block.type === 'bullet') return <div className="mr-3 ml-2 mt-2.5 w-1.5 h-1.5 rounded-full bg-slate-800 flex-shrink-0"></div>;
          if (block.type === 'toggle') return <ChevronRight size={20} className="mr-1 mt-0.5 text-slate-400 flex-shrink-0" />;
          return null;
        };

        return (
          <div className="flex h-full bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden animate-fadeIn">
            <div className="w-64 bg-slate-50 border-r border-slate-200 flex flex-col">
              <div className="p-4 border-b border-slate-200 flex justify-between items-center bg-slate-100/50">
                <span className="font-semibold text-slate-700 text-sm">페이지 관리</span>
                <button onClick={handleAddWeek} className="text-slate-500 hover:text-slate-800 hover:bg-slate-200 p-1 rounded transition">
                  <Plus size={18} />
                </button>
              </div>
              <div className="flex-1 overflow-y-auto py-2">
                {weeks.map(week => (
                  <div key={week.id} onClick={() => setActiveWeekId(week.id)}
                    className={`flex items-center px-4 py-2 cursor-pointer text-sm transition-colors ${activeWeekId === week.id ? 'bg-slate-200/60 font-medium text-slate-800' : 'text-slate-600 hover:bg-slate-100'}`}>
                    <FileText size={16} className="mr-2 text-slate-400" />
                    <span className="truncate flex-1">{week.title || "제목 없음"}</span>
                  </div>
                ))}
              </div>
            </div>

            <div className="flex-1 overflow-y-auto p-8 lg:px-24 xl:px-32 relative">
              {activeWeekId ? (
                <div className="max-w-3xl mx-auto pb-32">
                  <input type="text" value={activeWeekTitle} onChange={handleTitleChange} 
                    placeholder="제목 없음" className="w-full text-4xl font-bold text-slate-800 mb-8 border-none bg-transparent placeholder-slate-300" />
                  
                  <div className="space-y-1">
                    {activeBlocks.map((block, index) => {
                      let textStyle = "flex-1 text-slate-700 border-none bg-transparent py-1 w-full";
                      if (block.type === 'h1') textStyle += " text-2xl font-bold mt-4 mb-2";
                      if (block.type === 'todo' && block.completed) textStyle += " text-slate-400 line-through";

                      return (
                        <div key={block.id} className="flex items-start group">
                          <div className="opacity-0 group-hover:opacity-100 cursor-grab p-1 mr-1 mt-0.5 text-slate-300">
                            <MoreHorizontal size={16} />
                          </div>
                          {renderBlockIcon(block, index)}
                          <input ref={el => inputRefs.current[block.id] = el} type="text" value={block.text}
                            onChange={(e) => handleBlockChange(index, block.id, e.target.value)}
                            onKeyDown={(e) => handleKeyDown(e, index, block.id)}
                            placeholder={block.type === 'text' ? "명령어를 사용하려면 '[] ', '- ', '# ' 등을 입력하세요" : ""}
                            className={textStyle} style={{ minHeight: '24px' }} />
                        </div>
                      );
                    })}
                  </div>
                </div>
              ) : (
                <div className="flex flex-col items-center justify-center h-full text-slate-400">
                  <CheckSquare size={48} className="mb-4 opacity-50" />
                  <p>좌측에서 주차를 선택하거나 추가해주세요.</p>
                </div>
              )}
            </div>
          </div>
        );
      };

      const renderContent = () => {
        switch (activeTab) {
          case 'checklist': return <ChecklistView />;
          default: return <div className="flex flex-col items-center justify-center h-full text-slate-400">이 탭은 준비중입니다.</div>;
        }
      };

      return (
        <div className="flex h-screen bg-slate-50 font-sans">
          <aside className="hidden md:flex flex-col w-64 bg-white border-r border-slate-200">
            <div className="p-6 flex items-center space-x-3">
              <div className="bg-teal-600 text-white p-2 rounded-lg shadow-sm"><FlaskConical size={24} /></div>
              <h1 className="text-xl font-bold text-slate-800 tracking-tight">태준실험실</h1>
            </div>
            <nav className="flex-1 px-4 space-y-1 mt-4 overflow-y-auto">
              {navigation.map((item) => {
                const Icon = item.icon;
                const isActive = activeTab === item.id;
                return (
                  <button key={item.id} onClick={() => handleTabChange(item.id)}
                    className={`w-full flex items-center px-4 py-3 text-sm font-medium rounded-lg transition-colors duration-150 ${isActive ? 'bg-teal-50 text-teal-700' : 'text-slate-600 hover:bg-slate-100'}`}>
                    <Icon size={20} className={`mr-3 ${isActive ? 'text-teal-700' : 'text-slate-400'}`} />
                    {item.name}
                  </button>
                );
              })}
            </nav>
          </aside>

          <main className="flex-1 flex flex-col min-w-0 overflow-hidden">
            <header className="bg-white border-b border-slate-200 p-4 flex items-center justify-between lg:px-8">
              <div className="flex items-center">
                <button className="md:hidden p-2 -ml-2 mr-2 text-slate-500 hover:text-slate-700 rounded-md hover:bg-slate-100" onClick={() => setIsMobileMenuOpen(true)}>
                  <Menu size={24} />
                </button>
                <h2 className="text-2xl font-bold text-slate-800 hidden sm:block">{navigation.find(n => n.id === activeTab)?.name}</h2>
              </div>
              
              <div className="flex items-center space-x-4">
                {/* 구글 드라이브 동기화 버튼 */}
                <button 
                  onClick={handleDriveConnectClick}
                  className={`flex items-center px-4 py-2 rounded-full text-sm font-medium transition-colors border ${
                    isDriveConnected 
                      ? 'bg-teal-50 text-teal-700 border-teal-200 hover:bg-teal-100' 
                      : 'bg-white text-slate-600 border-slate-300 hover:bg-slate-50'
                  }`}
                >
                  {isSyncing ? <RefreshCw size={18} className="mr-2 animate-spin text-teal-500" /> 
                    : (isDriveConnected ? <Cloud size={18} className="mr-2 text-teal-600" /> : <CloudOff size={18} className="mr-2" />)}
                  {isSyncing ? '저장중...' : (isDriveConnected ? '드라이브 동기화됨' : '구글 드라이브 연결')}
                </button>
              </div>
            </header>
            <div className="flex-1 overflow-hidden p-4 md:p-6 lg:p-8">
              {renderContent()}
            </div>
          </main>
        </div>
      );
    }

    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
