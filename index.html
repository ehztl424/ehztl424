<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>태준실험실 - 업무 통합 대시보드</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Babel (브라우저에서 React JSX를 읽을 수 있게 해줌) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <!-- ES Modules Import Map (React, 아이콘, Firebase 라이브러리 불러오기) -->
  <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "lucide-react": "https://esm.sh/lucide-react@0.294.0",
        "firebase/app": "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js",
        "firebase/auth": "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js"
      }
    }
  </script>

  <style>
    /* 기본 애니메이션 */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-100%); }
      to { transform: translateX(0); }
    }
    .animate-fadeIn { animation: fadeIn 0.3s ease-out forwards; }
    .animate-slideInLeft { animation: slideInLeft 0.3s ease-out forwards; }
    
    /* 텍스트 입력창 포커스 아웃라인 제거 */
    input:focus { outline: none; }
  </style>
</head>
<body>
  <!-- React 앱이 그려질 위치 -->
  <div id="root"></div>

  <!-- React 메인 로직 -->
  <script type="text/babel" data-type="module">
    import React, { useState, useEffect, useRef, useCallback } from 'react';
    import { createRoot } from 'react-dom/client';
    import { 
      Microscope, FlaskConical, FileText, Users, Archive, CheckSquare, 
      Menu, X, Bell, Search, TrendingUp, Clock, AlertCircle, 
      Plus, MoreHorizontal, ChevronRight
    } from 'lucide-react';
    import { initializeApp } from 'firebase/app';
    import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from 'firebase/auth';
    import { getFirestore, collection, doc, onSnapshot, updateDoc, addDoc } from 'firebase/firestore';

    // --- Firebase 초기화 (깃허브 연동을 위해 예외처리 추가) ---
    const firebaseConfigStr = typeof __firebase_config !== 'undefined' ? __firebase_config : '{}';
    let app, auth, db;
    try {
      const config = JSON.parse(firebaseConfigStr);
      if (Object.keys(config).length > 0) {
        app = initializeApp(config);
        auth = getAuth(app);
        db = getFirestore(app);
      }
    } catch (e) {
      console.log("Firebase가 아직 연결되지 않았습니다. 임시 메모리 모드로 작동합니다.");
    }
    const appId = typeof __app_id !== 'undefined' ? __app_id : 'personal-dashboard';

    function App() {
      const [user, setUser] = useState(null);
      const [activeTab, setActiveTab] = useState('checklist');
      const [isMobileMenuOpen, setIsMobileMenuOpen] = useState(false);
      const [isLoading, setIsLoading] = useState(false); // 깃허브를 위해 로딩 기본 false

      const [stats] = useState({ salesTarget: 75, activeBids: 3, teamTasks: 12, pendingFiles: 5 });

      useEffect(() => {
        if (!auth) return;
        const initAuth = async () => {
          try {
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
              await signInWithCustomToken(auth, __initial_auth_token);
            } else {
              await signInAnonymously(auth);
            }
          } catch (error) {
            console.error("인증 실패:", error);
          }
        };
        initAuth();

        const unsubscribe = onAuthStateChanged(auth, (currentUser) => {
          setUser(currentUser);
        });
        return () => unsubscribe();
      }, []);

      const navigation = [
        { id: 'dashboard', name: '대시보드', icon: Microscope },
        { id: 'sales', name: '영업 관리', icon: TrendingUp },
        { id: 'bids', name: '입찰 리스트', icon: FileText },
        { id: 'team', name: '팀 진척도', icon: Users },
        { id: 'files', name: '파일 저장소', icon: Archive },
        { id: 'checklist', name: '체크리스트', icon: CheckSquare },
      ];

      const handleTabChange = (tabId) => {
        setActiveTab(tabId);
        setIsMobileMenuOpen(false);
      };

      // --- 체크리스트 컴포넌트 ---
      const ChecklistView = () => {
        const [weeks, setWeeks] = useState([]);
        const [activeWeekId, setActiveWeekId] = useState(null);
        const [blocks, setBlocks] = useState([]);
        const [weekTitle, setWeekTitle] = useState("");
        const inputRefs = useRef({});

        // 임시 데이터 (DB가 연결 안 된 깃허브 환경용)
        const [localWeeks, setLocalWeeks] = useState([
          { id: 'temp-1', title: '이번 주 진행사항', createdAt: Date.now() }
        ]);
        const [localBlocks, setLocalBlocks] = useState({
          'temp-1': [
            { id: crypto.randomUUID(), type: 'h1', text: 'GitHub 연동 테스트', completed: false },
            { id: crypto.randomUUID(), type: 'todo', text: 'index.html 파일에 코드 붙여넣기', completed: true },
            { id: crypto.randomUUID(), type: 'todo', text: '다음 기능(영업관리 등) 구상하기', completed: false },
            { id: crypto.randomUUID(), type: 'text', text: '단축키 "[] " 를 입력하면 체크박스가 생성됩니다.', completed: false }
          ]
        });

        // 데이터 로드
        useEffect(() => {
          if (db && user) {
            const weeksRef = collection(db, 'artifacts', appId, 'users', user.uid, 'checklist_weeks');
            const unsubscribe = onSnapshot(weeksRef, (snapshot) => {
              const weeksData = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
              weeksData.sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));
              setWeeks(weeksData);
              if (weeksData.length > 0 && !activeWeekId) setActiveWeekId(weeksData[0].id);
            });
            return () => unsubscribe();
          } else {
            // DB 없을 때 로컬 임시 데이터 사용
            setWeeks(localWeeks);
            if (!activeWeekId && localWeeks.length > 0) setActiveWeekId(localWeeks[0].id);
          }
        }, [db, user, activeWeekId, localWeeks]);

        // 상세 블록 로드
        useEffect(() => {
          if (!activeWeekId) return;
          if (db && user) {
            const weekDocRef = doc(db, 'artifacts', appId, 'users', user.uid, 'checklist_weeks', activeWeekId);
            const unsubscribe = onSnapshot(weekDocRef, (docSnap) => {
              if (docSnap.exists()) {
                const data = docSnap.data();
                setWeekTitle(data.title || "제목 없음");
                setBlocks(data.blocks && data.blocks.length > 0 ? data.blocks : [{ id: crypto.randomUUID(), type: 'text', text: '', completed: false }]);
              }
            });
            return () => unsubscribe();
          } else {
            const currentWeek = localWeeks.find(w => w.id === activeWeekId);
            setWeekTitle(currentWeek?.title || "제목 없음");
            setBlocks(localBlocks[activeWeekId] || [{ id: crypto.randomUUID(), type: 'text', text: '', completed: false }]);
          }
        }, [db, user, activeWeekId, localWeeks, localBlocks]);

        // 데이터 저장
        const saveBlocksToFirebase = useCallback(async (newBlocks, newTitle = weekTitle) => {
          if (db && user && activeWeekId) {
            try {
              const weekDocRef = doc(db, 'artifacts', appId, 'users', user.uid, 'checklist_weeks', activeWeekId);
              await updateDoc(weekDocRef, { title: newTitle, blocks: newBlocks, updatedAt: Date.now() });
            } catch (error) { console.error("저장 실패:", error); }
          } else if (activeWeekId) {
            setLocalBlocks(prev => ({ ...prev, [activeWeekId]: newBlocks }));
            setLocalWeeks(prev => prev.map(w => w.id === activeWeekId ? { ...w, title: newTitle } : w));
          }
        }, [db, user, activeWeekId, weekTitle]);

        const handleAddWeek = async () => {
          const today = new Date();
          const newTitle = `${today.getMonth() + 1}월 ${Math.ceil(today.getDate() / 7)}주차`;
          const initBlock = [{ id: crypto.randomUUID(), type: 'text', text: '', completed: false }];
          
          if (db && user) {
            try {
              const weeksRef = collection(db, 'artifacts', appId, 'users', user.uid, 'checklist_weeks');
              const docRef = await addDoc(weeksRef, { title: newTitle, blocks: initBlock, createdAt: Date.now(), updatedAt: Date.now() });
              setActiveWeekId(docRef.id);
            } catch (error) {}
          } else {
            const newId = crypto.randomUUID();
            setLocalWeeks([{ id: newId, title: newTitle, createdAt: Date.now() }, ...localWeeks]);
            setLocalBlocks({ ...localBlocks, [newId]: initBlock });
            setActiveWeekId(newId);
          }
        };

        const handleBlockChange = (index, id, newText) => {
          const newBlocks = [...blocks];
          let currentBlock = { ...newBlocks[index] };

          if (currentBlock.type === 'text') {
            if (newText === '[] ' || newText === '[ ] ') { currentBlock.type = 'todo'; currentBlock.text = ''; currentBlock.completed = false; }
            else if (newText === '[x] ' || newText === '[v] ') { currentBlock.type = 'todo'; currentBlock.text = ''; currentBlock.completed = true; }
            else if (newText === '> ') { currentBlock.type = 'toggle'; currentBlock.text = ''; }
            else if (newText === '- ') { currentBlock.type = 'bullet'; currentBlock.text = ''; }
            else if (newText === '# ') { currentBlock.type = 'h1'; currentBlock.text = ''; }
            else { currentBlock.text = newText; }
          } else { currentBlock.text = newText; }

          newBlocks[index] = currentBlock;
          setBlocks(newBlocks);
        };

        const handleKeyDown = (e, index, id) => {
          if (e.key === 'Enter') {
            e.preventDefault();
            const newBlocks = [...blocks];
            const newId = crypto.randomUUID();
            const nextType = newBlocks[index].type === 'todo' ? 'todo' : 'text';
            newBlocks.splice(index + 1, 0, { id: newId, type: nextType, text: '', completed: false });
            setBlocks(newBlocks);
            saveBlocksToFirebase(newBlocks);
            setTimeout(() => { if (inputRefs.current[newId]) inputRefs.current[newId].focus(); }, 50);
          } 
          else if (e.key === 'Backspace' && blocks[index].text === '') {
            if (blocks[index].type !== 'text') {
              e.preventDefault();
              const newBlocks = [...blocks];
              newBlocks[index].type = 'text';
              setBlocks(newBlocks);
              saveBlocksToFirebase(newBlocks);
            } else if (blocks.length > 1) {
              e.preventDefault();
              const newBlocks = [...blocks];
              newBlocks.splice(index, 1);
              setBlocks(newBlocks);
              saveBlocksToFirebase(newBlocks);
              const prevId = newBlocks[index - 1] ? newBlocks[index - 1].id : newBlocks[0].id;
              setTimeout(() => { if (inputRefs.current[prevId]) inputRefs.current[prevId].focus(); }, 50);
            }
          }
          else if (e.key === 'ArrowUp' && index > 0) { e.preventDefault(); inputRefs.current[blocks[index - 1].id]?.focus(); }
          else if (e.key === 'ArrowDown' && index < blocks.length - 1) { e.preventDefault(); inputRefs.current[blocks[index + 1].id]?.focus(); }
        };

        const toggleTodoCompleted = (index) => {
          const newBlocks = [...blocks];
          newBlocks[index].completed = !newBlocks[index].completed;
          setBlocks(newBlocks);
          saveBlocksToFirebase(newBlocks);
        };

        const renderBlockIcon = (block, index) => {
          if (block.type === 'todo') {
            return (
              <button onClick={() => toggleTodoCompleted(index)} 
                className={`mr-2 mt-1 w-5 h-5 flex-shrink-0 flex items-center justify-center border rounded hover:bg-slate-50 transition-colors ${block.completed ? 'border-sky-500 bg-sky-500' : 'border-slate-300 bg-transparent'}`}>
                {block.completed && <CheckSquare size={14} color="white" />}
              </button>
            );
          }
          if (block.type === 'bullet') return <div className="mr-3 ml-2 mt-2.5 w-1.5 h-1.5 rounded-full bg-slate-800 flex-shrink-0"></div>;
          if (block.type === 'toggle') return <ChevronRight size={20} className="mr-1 mt-0.5 text-slate-400 flex-shrink-0" />;
          return null;
        };

        return (
          <div className="flex h-full bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden animate-fadeIn">
            <div className="w-64 bg-slate-50 border-r border-slate-200 flex flex-col">
              <div className="p-4 border-b border-slate-200 flex justify-between items-center bg-slate-100/50">
                <span className="font-semibold text-slate-700 text-sm">페이지 관리</span>
                <button onClick={handleAddWeek} className="text-slate-500 hover:text-slate-800 hover:bg-slate-200 p-1 rounded transition">
                  <Plus size={18} />
                </button>
              </div>
              <div className="flex-1 overflow-y-auto py-2">
                {weeks.map(week => (
                  <div key={week.id} onClick={() => setActiveWeekId(week.id)}
                    className={`flex items-center px-4 py-2 cursor-pointer text-sm transition-colors ${activeWeekId === week.id ? 'bg-slate-200/60 font-medium text-slate-800' : 'text-slate-600 hover:bg-slate-100'}`}>
                    <FileText size={16} className="mr-2 text-slate-400" />
                    <span className="truncate flex-1">{week.title || "제목 없음"}</span>
                  </div>
                ))}
              </div>
            </div>

            <div className="flex-1 overflow-y-auto p-8 lg:px-24 xl:px-32 relative">
              {activeWeekId ? (
                <div className="max-w-3xl mx-auto pb-32">
                  <input type="text" value={weekTitle} onChange={(e) => setWeekTitle(e.target.value)} onBlur={() => saveBlocksToFirebase(blocks, weekTitle)}
                    placeholder="제목 없음" className="w-full text-4xl font-bold text-slate-800 mb-8 border-none bg-transparent placeholder-slate-300" />
                  
                  <div className="space-y-1">
                    {blocks.map((block, index) => {
                      let textStyle = "flex-1 text-slate-700 border-none bg-transparent py-1 w-full";
                      if (block.type === 'h1') textStyle += " text-2xl font-bold mt-4 mb-2";
                      if (block.type === 'todo' && block.completed) textStyle += " text-slate-400 line-through";

                      return (
                        <div key={block.id} className="flex items-start group">
                          <div className="opacity-0 group-hover:opacity-100 cursor-grab p-1 mr-1 mt-0.5 text-slate-300">
                            <MoreHorizontal size={16} />
                          </div>
                          {renderBlockIcon(block, index)}
                          <input ref={el => inputRefs.current[block.id] = el} type="text" value={block.text}
                            onChange={(e) => handleBlockChange(index, block.id, e.target.value)}
                            onKeyDown={(e) => handleKeyDown(e, index, block.id)}
                            onBlur={() => saveBlocksToFirebase(blocks)}
                            placeholder={block.type === 'text' ? "명령어를 사용하려면 '[] ', '- ', '# ' 등을 입력하세요" : ""}
                            className={textStyle} style={{ minHeight: '24px' }} />
                        </div>
                      );
                    })}
                  </div>
                </div>
              ) : (
                <div className="flex flex-col items-center justify-center h-full text-slate-400">
                  <CheckSquare size={48} className="mb-4 opacity-50" />
                  <p>좌측에서 주차를 선택하거나 추가해주세요.</p>
                </div>
              )}
            </div>
          </div>
        );
      };

      const DashboardView = () => (
        <div className="space-y-6 animate-fadeIn">
          <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
            <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200 flex items-center space-x-4">
              <div className="p-3 bg-teal-50 text-teal-600 rounded-lg"><TrendingUp size={24} /></div>
              <div><p className="text-sm text-slate-500 font-medium">영업 목표 달성률</p><p className="text-2xl font-bold text-slate-800">{stats.salesTarget}%</p></div>
            </div>
            <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200 flex items-center space-x-4">
              <div className="p-3 bg-cyan-50 text-cyan-600 rounded-lg"><FileText size={24} /></div>
              <div><p className="text-sm text-slate-500 font-medium">진행중인 입찰</p><p className="text-2xl font-bold text-slate-800">{stats.activeBids}건</p></div>
            </div>
            <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200 flex items-center space-x-4">
              <div className="p-3 bg-emerald-50 text-emerald-600 rounded-lg"><Users size={24} /></div>
              <div><p className="text-sm text-slate-500 font-medium">팀 할당 업무</p><p className="text-2xl font-bold text-slate-800">{stats.teamTasks}개</p></div>
            </div>
            <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200 flex items-center space-x-4">
              <div className="p-3 bg-amber-50 text-amber-600 rounded-lg"><Archive size={24} /></div>
              <div><p className="text-sm text-slate-500 font-medium">검토 대기 파일</p><p className="text-2xl font-bold text-slate-800">{stats.pendingFiles}개</p></div>
            </div>
          </div>

          <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
            <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-6">
              <div className="flex justify-between items-center mb-4">
                <h3 className="text-lg font-bold text-slate-800">최근 진행 현황</h3>
                <button className="text-sm text-teal-600 hover:text-teal-800" onClick={() => handleTabChange('bids')}>전체보기</button>
              </div>
              <div className="space-y-4">
                <div className="flex items-center p-3 hover:bg-slate-50 rounded-lg transition-colors">
                  <Clock className="text-slate-400 mr-3" size={20} />
                  <div className="flex-1">
                    <p className="text-sm font-medium text-slate-800">B공공기관 구축 사업 입찰</p>
                    <p className="text-xs text-slate-500">제안서 작성 중 (마감 D-3)</p>
                  </div>
                  <span className="px-2 py-1 bg-amber-100 text-amber-800 text-xs rounded-full font-medium">진행중</span>
                </div>
              </div>
            </div>
          </div>
        </div>
      );

      const PlaceholderView = ({ title, icon: Icon }) => (
        <div className="flex flex-col items-center justify-center h-full min-h-[400px] bg-white rounded-xl border border-dashed border-slate-300 animate-fadeIn text-center p-6">
          <Icon size={48} className="text-slate-300 mb-4" />
          <h2 className="text-xl font-bold text-slate-700 mb-2">{title} 탭</h2>
          <p className="text-slate-500 max-w-md">이곳에 {title} 관련 기능이 추가될 예정입니다.<br/>다음 요청에서 상세 구성을 알려주세요!</p>
        </div>
      );

      const renderContent = () => {
        switch (activeTab) {
          case 'dashboard': return <DashboardView />;
          case 'sales': return <PlaceholderView title="영업 관리" icon={TrendingUp} />;
          case 'bids': return <PlaceholderView title="입찰 리스트" icon={FileText} />;
          case 'team': return <PlaceholderView title="팀 진척도" icon={Users} />;
          case 'files': return <PlaceholderView title="파일 저장소" icon={Archive} />;
          case 'checklist': return <ChecklistView />;
          default: return <DashboardView />;
        }
      };

      if (isLoading) return <div className="flex items-center justify-center h-screen bg-slate-50 text-slate-500">데이터를 불러오는 중입니다...</div>;

      return (
        <div className="flex h-screen bg-slate-50 font-sans">
          {/* 사이드바 */}
          <aside className="hidden md:flex flex-col w-64 bg-white border-r border-slate-200">
            <div className="p-6 flex items-center space-x-3">
              <div className="bg-teal-600 text-white p-2 rounded-lg shadow-sm"><FlaskConical size={24} /></div>
              <h1 className="text-xl font-bold text-slate-800 tracking-tight">태준실험실</h1>
            </div>
            <nav className="flex-1 px-4 space-y-1 mt-4 overflow-y-auto">
              {navigation.map((item) => {
                const Icon = item.icon;
                const isActive = activeTab === item.id;
                return (
                  <button key={item.id} onClick={() => handleTabChange(item.id)}
                    className={`w-full flex items-center px-4 py-3 text-sm font-medium rounded-lg transition-colors duration-150 ${isActive ? 'bg-teal-50 text-teal-700' : 'text-slate-600 hover:bg-slate-100'}`}>
                    <Icon size={20} className={`mr-3 ${isActive ? 'text-teal-700' : 'text-slate-400'}`} />
                    {item.name}
                  </button>
                );
              })}
            </nav>
          </aside>

          {/* 메인 영역 */}
          <main className="flex-1 flex flex-col min-w-0 overflow-hidden">
            <header className="bg-white border-b border-slate-200 p-4 flex items-center justify-between lg:px-8">
              <div className="flex items-center">
                <h2 className="text-2xl font-bold text-slate-800 hidden sm:block">{navigation.find(n => n.id === activeTab)?.name}</h2>
              </div>
              <div className="flex items-center space-x-4">
                <div className="relative hidden sm:block">
                  <Search className="absolute left-3 top-1/2 transform -translate-y-1/2 text-slate-400" size={18} />
                  <input type="text" placeholder="검색..." className="pl-10 pr-4 py-2 bg-slate-50 border border-slate-200 rounded-full text-sm focus:ring-2 focus:ring-teal-500 w-64" />
                </div>
              </div>
            </header>
            <div className="flex-1 overflow-hidden p-4 md:p-6 lg:p-8">
              {renderContent()}
            </div>
          </main>
        </div>
      );
    }

    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
