<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>태준실험실 - 전문 자료관리시스템</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700;900&display=swap');
    @font-face {
      font-family: 'Pretendard';
      src: url('https://cdn.jsdelivr.net/gh/Project-Noonnu/noonfonts_2107@1.1/Pretendard-Regular.woff') format('woff');
      font-weight: normal; font-style: normal;
    }
    body { font-family: 'Pretendard', sans-serif; overflow-x: hidden; background-color: #f8fafc; }
    
    .spinner {
      border: 3px solid rgba(0, 0, 0, 0.1);
      width: 28px; height: 28px; border-radius: 50%;
      border-left-color: #2563eb; animation: spin 1s linear infinite;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    
    /* 체크리스트 가독성 */
    .notion-row:focus-within { background-color: #f1f5f9; border-radius: 8px; }
    .notion-input { background: transparent; border: none; outline: none; width: 100%; padding: 4px 0; }
    
    /* 자료 보관소 테이블 최적화 */
    .archive-table { width: 100%; border-collapse: collapse; table-layout: fixed; }
    .archive-table th { background: #f1f5f9; color: #64748b; font-size: 11px; text-transform: uppercase; padding: 12px 20px; font-weight: 800; border-bottom: 1px solid #e2e8f0; }
    .archive-table td { padding: 16px 20px; border-bottom: 1px solid #f1f5f9; vertical-align: middle; }

    /* 재직증명서 A4 레이아웃 */
    .cert-container {
      width: 210mm; min-height: 297mm; padding: 20mm; background: white; margin: 0 auto;
      box-shadow: 0 0 30px rgba(0,0,0,0.1); color: black; line-height: 1.5; position: relative;
    }
    .cert-header { font-family: 'Noto Serif KR', serif; font-size: 45px; font-weight: 900; text-align: center; margin-bottom: 50px; letter-spacing: 15px; text-decoration: underline; text-underline-offset: 8px; }
    .cert-table { width: 100%; border: 2px solid black; border-collapse: collapse; margin-bottom: 30px; }
    .cert-table th, .cert-table td { border: 1px solid black; padding: 10px 15px; font-size: 16px; height: 50px; }
    .cert-table th { background: #f5f5f5; width: 140px; font-weight: 700; text-align: center; letter-spacing: 2px; }
    
    /* 도장/인감 위치 세팅 */
    .seal-wrap { position: relative; display: inline-block; }
    .seal-img { position: absolute; width: 60px; height: 60px; left: 140px; top: -15px; opacity: 0.85; pointer-events: none; }

    /* 인쇄 모드 */
    @media print {
      body * { visibility: hidden; }
      .print-area, .print-area * { visibility: visible; }
      .print-area { position: absolute; left: 0; top: 0; width: 100%; box-shadow: none; padding: 0; }
      @page { size: A4; margin: 0; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const firebaseConfig = {
      apiKey: "AIzaSyCfHF_0xj-9qdD-VcwDCv_gJtQhDtmvSXQ",
      authDomain: "taejun-lab.firebaseapp.com",
      projectId: "taejun-lab",
      storageBucket: "taejun-lab.firebasestorage.app",
      messagingSenderId: "1064401778915",
      appId: "1:1064401778915:web:0cf6b5bf131c0c75276dd6"
    };
    
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();
    const appId = 'taejun-lab';

    const { useState, useEffect, useRef, useCallback, useMemo } = React;

    const Icons = {
      Beaker: ({size=24}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M4.5 3h15"/><path d="M6 3v16a2 2 0 0 0 2 2h8a2 2 0 0 0 2-2V3"/><path d="M6 14h12"/></svg>,
      Table: ({size=20}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="18" height="18" x="3" y="3" rx="2"/><path d="M3 9h18"/><path d="M3 15h18"/><path d="M9 3v18"/><path d="M15 3v18"/></svg>,
      Check: ({size=20}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><path d="m9 12 2 2 4-4"/></svg>,
      FileText: ({size=20}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/><line x1="16" x2="8" y1="13" y2="13"/><line x1="16" x2="8" y1="17" y2="17"/><line x1="10" x2="8" y1="9" y2="9"/></svg>,
      Link: ({size=20}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>,
      Printer: ({size=18}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect width="12" height="8" x="6" y="14"/></svg>,
      Trash: ({size=16}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>,
      ChevronDown: ({size=16}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m6 9 6 6 6-6"/></svg>,
      Plus: ({size=18}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    };

    function App() {
      const [user, setUser] = useState(null);
      const [loading, setLoading] = useState(true);
      const [loginId, setLoginId] = useState('');
      const [loginPw, setLoginPw] = useState('');
      const [errorMsg, setErrorMsg] = useState('');
      
      const [activeTab, setActiveTab] = useState('bid_sheet');
      const [isDocMenuOpen, setIsDocMenuOpen] = useState(true);

      const [archives, setArchives] = useState([]);
      const [weeklyChecklists, setWeeklyChecklists] = useState([]);
      const [selectedWeekId, setSelectedWeekId] = useState(null);
      const [bidData, setBidData] = useState([]);
      const [bidFilters, setBidFilters] = useState({ status: '', category: '', client: '', title: '', entity: '' });
      
      const [certData, setCertData] = useState({
        docNo: '제 20260721-01호',
        name: '이 장 석',
        ssn: '891101-1******',
        address: '경기도 광명시 철산동 센트럴프루지오',
        position: '대표이사',
        dept: '대표이사 부',
        period: '2021년 04월 01일 ~ 2026년 02월 04일(현재)',
        workType: '상근',
        hireType: '정규직',
        issueDate: '2026-02-04',
        companyAddr: '서울시 금천구 디지털로 178, 가산퍼블릭 제A 동 5층 502호',
        companyName: '㈜워드캣 (150-81-01259)',
        ceoName: '이 장 석'
      });

      const saveTimerRef = useRef(null);

      useEffect(() => {
        const unsub = auth.onAuthStateChanged((u) => { setUser(u); setLoading(false); });
        return () => unsub();
      }, []);

      useEffect(() => {
        if (!user) return;
        const userPath = `artifacts/${appId}/users/${user.uid}`;
        
        db.collection(`${userPath}/archives`).onSnapshot(snap => {
          setArchives(snap.docs.map(d => ({ id: d.id, ...d.data() })).sort((a,b)=>b.createdAt - a.createdAt));
        });

        db.collection(`${userPath}/checklists`).onSnapshot(snap => {
          const list = snap.docs.map(d => ({ id: d.id, ...d.data() })).sort((a,b)=>b.order - a.order);
          setWeeklyChecklists(list);
          if (list.length > 0 && !selectedWeekId) setSelectedWeekId(list[0].id);
        });

        db.collection(`${userPath}/bids`).onSnapshot(snap => {
          setBidData(snap.docs.map(d => ({ id: d.id, ...d.data() })).sort((a,b)=>b.createdAt - a.createdAt));
        });
      }, [user]);

      const handleLogin = async (e) => {
        e.preventDefault();
        const finalEmail = loginId.includes('@') ? loginId : `${loginId}@taejun.lab`;
        try { await auth.signInWithEmailAndPassword(finalEmail, loginPw); } catch (err) { setErrorMsg("계정 정보가 일치하지 않습니다."); }
      };

      // --- 체크리스트 동기화 로직 ---
      const syncChecklist = useCallback((weekId, items) => {
        if (saveTimerRef.current) clearTimeout(saveTimerRef.current);
        saveTimerRef.current = setTimeout(async () => {
          if (!user) return;
          await db.doc(`artifacts/${appId}/users/${user.uid}/checklists/${weekId}`).update({ items });
        }, 1000);
      }, [user]);

      const handleCheckItemChange = (weekId, index, field, value) => {
        setWeeklyChecklists(prev => {
          const updated = [...prev];
          const wIdx = updated.findIndex(w => w.id === weekId);
          if (wIdx === -1) return prev;
          let newItems = [...updated[wIdx].items];
          let finalValue = value;
          let finalLevel = newItems[index].level;
          
          if (field === 'text' && value.startsWith('> ')) { finalValue = value.substring(2); finalLevel = Math.min(4, finalLevel + 1); }
          else if (field === 'text' && value.startsWith('[] ')) { finalValue = value.substring(3); }
          
          newItems[index] = { ...newItems[index], [field]: finalValue, level: finalLevel };
          updated[wIdx].items = newItems;
          syncChecklist(weekId, newItems);
          return updated;
        });
      };

      const handleCheckKeyDown = (e, weekId, index) => {
        const week = weeklyChecklists.find(w => w.id === weekId);
        if (!week) return;
        let newItems = [...week.items];
        const item = newItems[index];

        if (e.key === 'Enter') {
          e.preventDefault();
          const newItem = { id: Math.random().toString(36).substr(2, 9), text: '', completed: false, level: item.level, bold: false };
          newItems.splice(index + 1, 0, newItem);
          setWeeklyChecklists(prev => {
            const next = [...prev];
            const wIdx = next.findIndex(w => w.id === weekId);
            next[wIdx].items = newItems;
            return next;
          });
          syncChecklist(weekId, newItems);
          setTimeout(() => document.getElementById(`notion-input-${index + 1}`)?.focus(), 10);
        } else if (e.key === 'Tab') {
          e.preventDefault();
          const newLevel = e.shiftKey ? Math.max(0, item.level - 1) : Math.min(4, item.level + 1);
          handleCheckItemChange(weekId, index, 'level', newLevel);
        } else if (e.key === 'Backspace' && item.text === '' && newItems.length > 1) {
          e.preventDefault();
          newItems.splice(index, 1);
          setWeeklyChecklists(prev => {
            const next = [...prev];
            const wIdx = next.findIndex(w => w.id === weekId);
            next[wIdx].items = newItems;
            return next;
          });
          syncChecklist(weekId, newItems);
          setTimeout(() => document.getElementById(`notion-input-${index - 1}`)?.focus(), 10);
        }
      };

      // --- 아카이브 경로 추가 ---
      const addPath = async () => {
        const name = prompt("자료 명칭");
        const path = prompt("NAS/로컬 경로 주소");
        if (!name || !path) return;
        await db.collection(`artifacts/${appId}/users/${user.uid}/archives`).add({
          name, url: path, isExternal: true, createdAt: Date.now()
        });
      };

      if (loading) return null;

      if (!user) {
        return (
          <div className="min-h-screen bg-[#0f172a] text-white flex items-center justify-center p-6">
            <div className="max-w-md w-full bg-[#1e293b] rounded-[2.5rem] shadow-2xl p-10 border border-slate-700">
              <div className="flex justify-center mb-8"><div className="p-4 bg-blue-600 rounded-2xl shadow-xl shadow-blue-500/20"><Icons.Beaker size={44}/></div></div>
              <h1 className="text-3xl font-black text-center mb-1 tracking-tighter uppercase leading-none">Taejun Lab</h1>
              <p className="text-center text-slate-400 mb-10 text-[10px] font-bold tracking-[0.4em] uppercase">Private Security</p>
              <form onSubmit={handleLogin} className="space-y-6">
                <input type="text" value={loginId} onChange={e=>setLoginId(e.target.value)} placeholder="실험실 ID" className="w-full bg-[#0f172a] border border-slate-700 rounded-xl p-4 outline-none font-bold focus:border-blue-500 transition-colors" required />
                <input type="password" value={loginPw} onChange={e=>setLoginPw(e.target.value)} placeholder="보안키" className="w-full bg-[#0f172a] border border-slate-700 rounded-xl p-4 outline-none font-bold focus:border-blue-500 transition-colors" required />
                {errorMsg && <div className="bg-red-500/10 text-red-500 text-[11px] text-center font-bold py-3 px-4 rounded-xl">{errorMsg}</div>}
                <button className="w-full bg-blue-600 hover:bg-blue-700 text-white font-black py-4 rounded-xl shadow-xl uppercase active:scale-95 transition-all">접속하기</button>
              </form>
            </div>
          </div>
        );
      }

      const activeWeek = weeklyChecklists.find(w => w.id === selectedWeekId);

      return (
        <div className="min-h-screen flex flex-col md:flex-row bg-[#f8fafc]">
          {/* 사이드바 */}
          <aside className="w-full md:w-64 bg-[#1e293b] text-white p-6 flex flex-col shadow-2xl shrink-0">
            <div className="flex items-center gap-3 mb-12 mt-2 px-2">
              <div className="p-2 bg-blue-600 rounded-xl shadow-lg shadow-blue-500/20"><Icons.Beaker size={22} color="white"/></div>
              <h1 className="text-xl font-black tracking-tighter uppercase leading-none">Taejun Lab</h1>
            </div>
            <nav className="flex-1 space-y-2">
              <button onClick={()=>setActiveTab('bid_sheet')} className={`w-full flex items-center gap-4 px-6 py-4 rounded-2xl transition-all font-bold text-sm ${activeTab === 'bid_sheet' ? 'bg-blue-600 shadow-xl text-white' : 'text-slate-400 hover:bg-slate-700/50'}`}>
                <Icons.Table size={20}/> <span>입찰 참여 시트</span>
              </button>
              <button onClick={()=>setActiveTab('checklist')} className={`w-full flex items-center gap-4 px-6 py-4 rounded-2xl transition-all font-bold text-sm ${activeTab === 'checklist' ? 'bg-blue-600 shadow-xl text-white' : 'text-slate-400 hover:bg-slate-700/50'}`}>
                <Icons.Check size={20}/> <span>체크리스트</span>
              </button>
              
              <div className="space-y-1">
                <button onClick={()=>setIsDocMenuOpen(!isDocMenuOpen)} className={`w-full flex items-center justify-between px-6 py-4 rounded-2xl transition-all font-bold text-sm text-slate-400 hover:bg-slate-700/50`}>
                  <div className="flex items-center gap-4"><Icons.FileText size={20}/> <span>서류 생성</span></div>
                  <Icons.ChevronDown size={14} className={`transition-transform ${isDocMenuOpen ? 'rotate-180' : ''}`} />
                </button>
                {isDocMenuOpen && (
                  <div className="pl-10 space-y-1 animate-fadeIn">
                    <button onClick={()=>setActiveTab('cert_emp')} className={`w-full text-left py-3 px-4 rounded-xl text-xs font-bold transition-all ${activeTab === 'cert_emp' ? 'text-blue-400 bg-blue-400/10' : 'text-slate-500 hover:text-white'}`}>재직증명서</button>
                    <div className="w-full text-left py-3 px-4 rounded-xl text-xs font-bold text-slate-700 italic cursor-not-allowed">준비 중...</div>
                  </div>
                )}
              </div>

              <button onClick={()=>setActiveTab('archives')} className={`w-full flex items-center gap-4 px-6 py-4 rounded-2xl transition-all font-bold text-sm ${activeTab === 'archives' ? 'bg-blue-600 shadow-xl text-white' : 'text-slate-400 hover:bg-slate-700/50'}`}>
                <Icons.Link size={20}/> <span>자료 보관소</span>
              </button>
            </nav>
            <button onClick={()=>auth.signOut()} className="mt-auto w-full flex items-center justify-center gap-2 bg-slate-800/40 hover:bg-red-500/10 text-slate-500 py-4 rounded-2xl transition-all text-[11px] font-black uppercase border border-slate-700/50">Logout System</button>
          </aside>

          {/* 메인 영역 */}
          <main className="flex-1 p-6 md:p-10 overflow-y-auto">
            {activeTab === 'bid_sheet' && (
              <div className="max-w-[1700px] mx-auto">
                <h2 className="text-4xl font-black text-slate-800 tracking-tighter uppercase mb-10 leading-none">Bidding Sheet</h2>
                <div className="bg-white rounded-[2.5rem] shadow-2xl border border-slate-100 overflow-hidden overflow-x-auto">
                  <table className="w-full text-left border-collapse">
                    <thead className="bg-slate-50 border-b-2 border-slate-100">
                      <tr>
                        <th className="px-6 py-4 text-[11px] font-black uppercase text-slate-400">상태</th>
                        <th className="px-6 py-4 text-[11px] font-black uppercase text-slate-400">발주처</th>
                        <th className="px-6 py-4 text-[11px] font-black uppercase text-slate-400">공고명</th>
                        <th className="px-6 py-4 text-[11px] font-black uppercase text-slate-400">투찰가</th>
                        <th className="px-6 py-4 text-right">삭제</th>
                      </tr>
                    </thead>
                    <tbody className="divide-y divide-slate-50 text-slate-700">
                      {bidData.map(bid => (
                        <tr key={bid.id} className="hover:bg-blue-50/40 transition-colors">
                          <td className="px-6 py-4"><span className="px-3 py-1 rounded-md bg-blue-100 text-blue-700 font-bold text-xs">{bid.status}</span></td>
                          <td className="px-6 py-4 font-black">{bid.client}</td>
                          <td className="px-6 py-4 text-slate-500">{bid.title}</td>
                          <td className="px-6 py-4 font-mono font-bold text-blue-600">₩{Number(bid.bidAmount || 0).toLocaleString()}</td>
                          <td className="px-6 py-4 text-right"><button onClick={()=>db.doc(`artifacts/${appId}/users/${user.uid}/bids/${bid.id}`).delete()} className="text-slate-200 hover:text-red-500"><Icons.Trash/></button></td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              </div>
            )}

            {activeTab === 'checklist' && (
              <div className="max-w-4xl mx-auto">
                <div className="flex items-center justify-between mb-12">
                  <h2 className="text-4xl font-black text-slate-800 tracking-tighter uppercase leading-none">Checklist</h2>
                  <button onClick={async () => {
                    const name = prompt("주차 명칭");
                    if(name) await db.collection(`artifacts/${appId}/users/${user.uid}/checklists`).add({ title: name, items: [{ id: Date.now().toString(36), text: '', completed: false, level: 0 }], createdAt: Date.now(), order: Date.now() });
                  }} className="bg-blue-600 text-white font-black px-6 py-4 rounded-2xl shadow-xl shadow-blue-500/20 active:scale-95 transition-all"><Icons.Plus/></button>
                </div>
                <div className="flex gap-2 mb-10 overflow-x-auto pb-2">
                  {weeklyChecklists.map(week => (
                    <button key={week.id} onClick={()=>setSelectedWeekId(week.id)} className={`px-6 py-3 rounded-2xl font-black text-xs transition-all border-2 whitespace-nowrap ${selectedWeekId === week.id ? 'bg-slate-800 text-white border-slate-800' : 'bg-white text-slate-400 border-slate-100'}`}>{week.title}</button>
                  ))}
                </div>
                {activeWeek && (
                  <div className="bg-white rounded-[3rem] shadow-2xl p-10 md:p-16 relative">
                    <h3 className="text-3xl font-black text-slate-800 mb-12 border-b-8 border-blue-600 inline-block pb-1 uppercase">{activeWeek.title}</h3>
                    <div className="space-y-1">
                      {activeWeek.items.map((item, idx) => (
                        <div key={item.id} className="flex items-start transition-all notion-row py-1" style={{ marginLeft: `${item.level * 32}px` }}>
                          <input type="checkbox" checked={item.completed} onChange={(e) => handleCheckItemChange(selectedWeekId, idx, 'completed', e.target.checked)} className="mt-2 w-5 h-5 rounded-md border-2 border-slate-200 accent-blue-600 cursor-pointer" />
                          <input id={`notion-input-${idx}`} type="text" value={item.text} onChange={(e) => handleCheckItemChange(selectedWeekId, idx, 'text', e.target.value)} onKeyDown={(e) => handleCheckKeyDown(e, selectedWeekId, idx)} className={`notion-input text-xl font-bold ml-4 ${item.completed ? 'text-slate-300 line-through' : 'text-slate-700'}`} placeholder="..." autoComplete="off" />
                        </div>
                      ))}
                    </div>
                  </div>
                )}
              </div>
            )}

            {activeTab === 'archives' && (
              <div className="max-w-6xl mx-auto">
                <div className="flex items-center justify-between mb-14">
                  <h2 className="text-5xl font-black text-slate-800 tracking-tighter uppercase leading-none">Archives</h2>
                  <button onClick={addPath} className="bg-slate-800 text-white font-black px-6 py-4 rounded-2xl shadow-xl flex items-center gap-2 active:scale-95 transition-all text-xs leading-none"><Icons.Link size={16}/> 외부 경로 추가</button>
                </div>
                <div className="bg-white rounded-[3.5rem] shadow-2xl border border-slate-50 overflow-hidden">
                  <div className="overflow-x-auto">
                    <table className="archive-table">
                      <thead>
                        <tr>
                          <th style={{ width: '60%' }}>자료 명칭 및 경로</th>
                          <th className="text-center" style={{ width: '20%' }}>등록일</th>
                          <th className="text-right" style={{ width: '20%' }}>관리</th>
                        </tr>
                      </thead>
                      <tbody className="divide-y divide-slate-50 text-slate-700">
                        {archives.map(item => (
                          <tr key={item.id} className="hover:bg-blue-50/50 transition-all">
                            <td>
                              <div className="flex items-center gap-5 overflow-hidden">
                                <div className="p-3 bg-blue-50 text-blue-500 rounded-xl shrink-0"><Icons.Link size={24}/></div>
                                <div className="flex flex-col truncate min-w-0">
                                  <span className="font-black text-xl tracking-tighter truncate">{item.name}</span>
                                  <span className="text-[11px] text-slate-400 truncate mt-1 opacity-70 font-mono italic">{item.url}</span>
                                </div>
                              </div>
                            </td>
                            <td className="text-center text-slate-400 font-bold tabular-nums">{new Date(item.createdAt).toLocaleDateString()}</td>
                            <td className="text-right">
                              <div className="flex justify-end gap-3">
                                <button onClick={()=>{ const t = document.createElement("input"); t.value = item.url; document.body.appendChild(t); t.select(); document.execCommand("copy"); document.body.removeChild(t); alert("경로 복사됨"); }} className="bg-slate-100 hover:bg-blue-600 hover:text-white text-slate-600 font-black text-[10px] px-6 py-3 rounded-xl transition-all">COPY</button>
                                <button onClick={()=>confirm("삭제?") && db.doc(`artifacts/${appId}/users/${user.uid}/archives/${item.id}`).delete()} className="text-slate-200 hover:text-red-500 p-2"><Icons.Trash/></button>
                              </div>
                            </td>
                          </tr>
                        ))}
                        {archives.length === 0 && (
                          <tr><td colSpan="3" className="py-24 text-center text-slate-300 font-bold italic">저장된 아카이브가 없습니다.</td></tr>
                        )}
                      </tbody>
                    </table>
                  </div>
                </div>
              </div>
            )}

            {activeTab === 'cert_emp' && (
              <div className="max-w-[1400px] mx-auto h-full flex flex-col lg:flex-row gap-10">
                {/* 폼 영역 */}
                <div className="w-full lg:w-[400px] bg-white rounded-[3rem] shadow-xl p-10 border border-slate-100 self-start">
                  <h3 className="text-2xl font-black text-slate-800 mb-8 border-l-8 border-blue-600 pl-4 uppercase leading-none">Certificate Form</h3>
                  <div className="space-y-4">
                    <div className="space-y-1"><label className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">문서번호</label><input type="text" value={certData.docNo} onChange={e=>setCertData({...certData, docNo: e.target.value})} className="w-full bg-slate-50 border border-slate-100 rounded-xl p-3 outline-none font-bold" /></div>
                    <div className="grid grid-cols-2 gap-4">
                      <div className="space-y-1"><label className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">성명</label><input type="text" value={certData.name} onChange={e=>setCertData({...certData, name: e.target.value})} className="w-full bg-slate-50 border border-slate-100 rounded-xl p-3 outline-none font-bold" /></div>
                      <div className="space-y-1"><label className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">직책</label><input type="text" value={certData.position} onChange={e=>setCertData({...certData, position: e.target.value})} className="w-full bg-slate-50 border border-slate-100 rounded-xl p-3 outline-none font-bold" /></div>
                    </div>
                    <div className="space-y-1"><label className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">주민번호</label><input type="text" value={certData.ssn} onChange={e=>setCertData({...certData, ssn: e.target.value})} className="w-full bg-slate-50 border border-slate-100 rounded-xl p-3 outline-none font-bold" /></div>
                    <div className="space-y-1"><label className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">발급일자</label><input type="date" value={certData.issueDate} onChange={e=>setCertData({...certData, issueDate: e.target.value})} className="w-full bg-blue-50 border border-blue-100 rounded-xl p-3 outline-none font-bold text-blue-700" /></div>
                    <button onClick={() => window.print()} className="w-full bg-blue-600 hover:bg-blue-700 text-white font-black py-5 rounded-2xl shadow-xl flex items-center justify-center gap-3 mt-6 transition-all active:scale-95"><Icons.Printer size={20}/> 인쇄 / PDF 저장</button>
                  </div>
                </div>

                {/* 미리보기 영역 */}
                <div className="flex-1 cert-preview-area overflow-x-auto">
                  <div className="cert-container print-area">
                    <div className="cert-header">재직증명서</div>
                    <div className="cert-doc-no">{certData.docNo}</div>
                    <table className="cert-table">
                      <tbody>
                        <tr><th>성 명</th><td className="font-bold">{certData.name}</td><th>주민등록번호</th><td>{certData.ssn}</td></tr>
                        <tr><th>주 소</th><td colSpan="3">{certData.address}</td></tr>
                        <tr><th>직 책</th><td>{certData.position}</td><th>부 서</th><td>{certData.dept}</td></tr>
                        <tr><th>근속기간</th><td colSpan="3">{certData.period}</td></tr>
                        <tr><th>근무형태</th><td>{certData.workType}</td><th>채용형태</th><td>{certData.hireType}</td></tr>
                      </tbody>
                    </table>
                    <div className="cert-main-text">위 사람은 상기와 같이 재직 하고 있음을 증명합니다.</div>
                    <div className="cert-date">{certData.issueDate.split('-')[0]}년 {certData.issueDate.split('-')[1]}월 {certData.issueDate.split('-')[2]}일</div>
                    <div className="mt-auto pt-20 border-t-2 border-black flex flex-col items-end gap-2 text-right">
                      <div className="text-lg font-bold">주 소 : {certData.companyAddr}</div>
                      <div className="text-lg font-bold">회 사 명 : {certData.companyName}</div>
                      <div className="text-3xl font-black mt-4 flex items-center seal-wrap">
                        대 표 : {certData.ceoName}
                        <img src="워드캣_법인인감.png" className="seal-img" alt="Seal" />
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            )}
          </main>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
