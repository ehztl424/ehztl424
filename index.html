<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>태준실험실 - Professional Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', 'Pretendard', sans-serif;
            background-color: #f8fafc;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(226, 232, 240, 0.8);
        }
        .sidebar-item:hover {
            background-color: #f1f5f9;
        }
        .sidebar-item.active {
            background-color: #e2e8f0;
            color: #0f172a;
            font-weight: 600;
        }
    </style>
</head>
<body class="text-slate-800">

    <div class="flex min-h-screen">
        <!-- Sidebar -->
        <aside class="w-64 bg-white border-r border-slate-200 hidden md:flex flex-col">
            <div class="p-6">
                <h1 class="text-xl font-bold text-indigo-600 flex items-center gap-2">
                    <!-- 실험실 느낌의 현미경/플라스크 아이콘으로 변경 시도 가능 -->
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4.5 3h15"/><path d="M6 3v16a2 2 0 0 0 2 2h8a2 2 0 0 0 2-2V3"/><path d="M6 14h12"/></svg>
                    태준실험실
                </h1>
            </div>
            <nav class="flex-1 px-4 space-y-2">
                <a href="#" onclick="showTab('dashboard')" id="nav-dashboard" class="sidebar-item active flex items-center gap-3 p-3 rounded-lg transition-all">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
                    대시보드
                </a>
                <a href="#" onclick="showTab('tasks')" id="nav-tasks" class="sidebar-item flex items-center gap-3 p-3 rounded-lg transition-all">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
                    할 일 관리
                </a>
            </nav>
            <div class="p-4 border-t border-slate-100">
                <div class="flex items-center gap-3 p-2">
                    <div id="user-avatar" class="w-8 h-8 rounded-full bg-indigo-100 flex items-center justify-center text-indigo-700 font-bold text-xs">TJ</div>
                    <div class="text-sm">
                        <p class="font-medium" id="user-name">태준님</p>
                        <p class="text-[10px] text-slate-400 truncate w-32" id="user-id">연결 중...</p>
                    </div>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 overflow-y-auto">
            <header class="bg-white border-b border-slate-200 sticky top-0 z-10 px-8 py-4 flex justify-between items-center">
                <h2 id="current-tab-title" class="text-xl font-semibold text-slate-800">대시보드</h2>
                <div class="flex items-center gap-4">
                    <span id="digital-clock" class="text-sm font-medium text-slate-500"></span>
                    <div id="sync-status" class="flex items-center gap-1 text-[10px] font-bold text-green-500 uppercase tracking-widest">
                        <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span>
                        Lab Synced
                    </div>
                </div>
            </header>

            <div class="p-8">
                <!-- Dashboard Tab -->
                <section id="tab-dashboard" class="space-y-8 animate-in fade-in duration-500">
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                        <div class="glass-card p-6 rounded-2xl shadow-sm">
                            <p class="text-sm text-slate-500 font-medium mb-1">실험 중인 프로젝트</p>
                            <h3 id="stat-total-tasks" class="text-3xl font-bold text-slate-900">0</h3>
                        </div>
                        <div class="glass-card p-6 rounded-2xl shadow-sm">
                            <p class="text-sm text-slate-500 font-medium mb-1">성공한 결과물</p>
                            <h3 id="stat-completed-tasks" class="text-3xl font-bold text-slate-900">0</h3>
                        </div>
                        <div class="glass-card p-6 rounded-2xl shadow-sm">
                            <p class="text-sm text-slate-500 font-medium mb-1">연구 진행률</p>
                            <h3 id="stat-progress" class="text-3xl font-bold text-slate-900">0%</h3>
                        </div>
                    </div>

                    <div class="glass-card rounded-2xl shadow-sm p-8 text-center" id="welcome-box">
                        <h3 class="text-xl font-bold mb-2">태준실험실에 오신 것을 환영합니다! 🧪</h3>
                        <p class="text-slate-500">클라우드와 연결되어 모든 실험 데이터(할 일)가 실시간으로 보존됩니다.</p>
                    </div>
                </section>

                <!-- Tasks Tab -->
                <section id="tab-tasks" class="hidden space-y-6 animate-in slide-in-from-bottom-4 duration-500">
                    <div class="flex flex-col md:flex-row gap-4 bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                        <input type="text" id="taskInput" placeholder="새로운 연구 과제를 입력하세요..." class="flex-1 px-4 py-2 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500">
                        <select id="prioritySelect" class="px-4 py-2 border border-slate-200 rounded-lg bg-white">
                            <option value="medium">보통</option>
                            <option value="high">중요</option>
                            <option value="low">낮음</option>
                        </select>
                        <button onclick="addTask()" class="bg-indigo-600 text-white px-8 py-2 rounded-lg hover:bg-indigo-700 transition-all font-medium whitespace-nowrap">과제 추가</button>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6" id="taskList">
                        <!-- Tasks from Cloud -->
                    </div>
                </section>
            </div>
        </main>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="fixed bottom-8 right-8 bg-slate-900 text-white px-6 py-3 rounded-xl shadow-2xl transition-all opacity-0 pointer-events-none transform translate-y-4 z-50">
        <p id="toast-msg" class="text-sm font-medium"></p>
    </div>

    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInAnonymously, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, addDoc, updateDoc, deleteDoc, onSnapshot, query } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Firebase Configuration (Provided by environment)
        const firebaseConfig = JSON.parse(__firebase_config);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'taejun-lab-v1';

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let user = null;
        let tasks = [];

        // Authentication Initialization
        const initAuth = async () => {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (error) {
                console.error("Auth error:", error);
                showToast("실험실 서버 연결 중 오류가 발생했습니다.");
            }
        };

        onAuthStateChanged(auth, (u) => {
            user = u;
            if (user) {
                document.getElementById('user-id').innerText = user.uid;
                // 기본 'TJ' 아바타 대신 사용자 ID 앞글자 사용 가능하지만, 태준실험실이므로 TJ 고정 권장
                startSync();
            }
        });

        initAuth();

        // Data Sync logic
        function startSync() {
            if (!user) return;
            const tasksRef = collection(db, 'artifacts', appId, 'public', 'data', 'tasks');
            
            onSnapshot(tasksRef, (snapshot) => {
                tasks = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                renderTasks();
                updateStats();
            }, (error) => {
                console.error("Sync error:", error);
                showToast("실험 데이터를 동기화할 수 없습니다.");
            });
        }

        // Global functions
        window.addTask = async function() {
            if (!user) return;
            const input = document.getElementById('taskInput');
            const priority = document.getElementById('prioritySelect').value;
            
            if (input.value.trim() === '') return;

            const newTask = {
                text: input.value,
                status: 'pending',
                priority: priority,
                createdAt: Date.now(),
                userId: user.uid
            };

            try {
                const tasksRef = collection(db, 'artifacts', appId, 'public', 'data', 'tasks');
                await addDoc(tasksRef, newTask);
                input.value = '';
                showToast('실험 데이터가 성공적으로 저장되었습니다.');
            } catch (e) {
                showToast('저장 실패: ' + e.message);
            }
        };

        window.toggleTask = async function(id, currentStatus) {
            if (!user) return;
            const taskDoc = doc(db, 'artifacts', appId, 'public', 'data', 'tasks', id);
            await updateDoc(taskDoc, {
                status: currentStatus === 'completed' ? 'pending' : 'completed'
            });
        };

        window.removeTask = async function(id) {
            if (!user) return;
            const taskDoc = doc(db, 'artifacts', appId, 'public', 'data', 'tasks', id);
            await deleteDoc(taskDoc);
            showToast('과제가 목록에서 삭제되었습니다.');
        };

        // UI Helpers
        function renderTasks() {
            const container = document.getElementById('taskList');
            container.innerHTML = '';
            
            const sortedTasks = [...tasks].sort((a, b) => b.createdAt - a.createdAt);

            sortedTasks.forEach(task => {
                const card = document.createElement('div');
                card.className = `glass-card p-5 rounded-2xl shadow-sm border border-slate-100 flex items-center gap-4 ${task.status === 'completed' ? 'opacity-60' : ''}`;
                
                const priorityClasses = {
                    high: 'bg-rose-500',
                    medium: 'bg-indigo-400',
                    low: 'bg-slate-300'
                };
                const pColor = priorityClasses[task.priority] || 'bg-slate-300';
                
                card.innerHTML = `
                    <div class="w-1 h-8 ${pColor} rounded-full"></div>
                    <div class="flex-1">
                        <p class="font-medium text-slate-800 ${task.status === 'completed' ? 'line-through' : ''}">${task.text}</p>
                        <p class="text-[9px] text-slate-400 mt-1 uppercase tracking-tighter">Researcher: ${task.userId.substring(0, 8)}...</p>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="toggleTask('${task.id}', '${task.status}')" class="p-2 hover:bg-slate-100 rounded-lg text-slate-500 transition-colors">
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
                        </button>
                        <button onclick="removeTask('${task.id}')" class="p-2 hover:bg-red-50 rounded-lg text-red-400 transition-colors">
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
                        </button>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function updateStats() {
            const total = tasks.length;
            const completed = tasks.filter(t => t.status === 'completed').length;
            const progress = total > 0 ? Math.round((completed / total) * 100) : 0;

            document.getElementById('stat-total-tasks').innerText = total;
            document.getElementById('stat-completed-tasks').innerText = completed;
            document.getElementById('stat-progress').innerText = progress + '%';
        }

        window.showTab = function(tabId) {
            ['dashboard', 'tasks'].forEach(tab => {
                document.getElementById(`tab-${tab}`).classList.toggle('hidden', tab !== tabId);
                document.getElementById(`nav-${tab}`).classList.toggle('active', tab === tabId);
            });
            const titles = { dashboard: '대시보드', tasks: '할 일 관리' };
            document.getElementById('current-tab-title').innerText = titles[tabId];
        };

        function showToast(msg) {
            const toast = document.getElementById('toast');
            document.getElementById('toast-msg').innerText = msg;
            toast.classList.remove('opacity-0', 'translate-y-4');
            toast.classList.add('opacity-100', 'translate-y-0');
            setTimeout(() => {
                toast.classList.add('opacity-0', 'translate-y-4');
                toast.classList.remove('opacity-100', 'translate-y-0');
            }, 3000);
        }

        function updateClock() {
            const now = new Date();
            document.getElementById('digital-clock').innerText = now.toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' });
        }
        setInterval(updateClock, 1000);
        updateClock();

        document.getElementById('taskInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') addTask();
        });
    </script>
</body>
</html>
