<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>태준실험실 - 전문 자료관리시스템</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="importmap">
    {
      "imports": {
        "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
        "firebase/auth": "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"
      }
    }
  </script>
</head>
<body class="bg-[#f0f2f5] text-gray-800">
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    import { initializeApp } from 'firebase/app';
    import { getAuth, onAuthStateChanged, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut } from 'firebase/auth';
    import { getFirestore, collection, onSnapshot, doc, setDoc, deleteDoc, addDoc, query, orderBy } from 'firebase/firestore';

    const { useState, useEffect, useRef } = React;

    // --- 아이콘 (SVG) ---
    const Beaker = ({size=24, color="currentColor"}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M4.5 3h15"/><path d="M6 3v16a2 2 0 0 0 2 2h8a2 2 0 0 0 2-2V3"/><path d="M6 14h12"/></svg>;
    const FileText = ({size=20}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><line x1="10" y1="9" x2="8" y2="9"/></svg>;
    const ExternalLink = ({size=18}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>;
    const LogOut = ({size=18}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" x2="9" y1="12" y2="12"/></svg>;
    const Trash = ({size=18}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>;

    // --- Firebase 설정 (회원님 설정값) ---
    const firebaseConfig = {
      apiKey: "AIzaSyCfHF_0xj-9qdD-VcwDCv_gJtQhDtmvSXQ",
      authDomain: "taejun-lab.firebaseapp.com",
      projectId: "taejun-lab",
      storageBucket: "taejun-lab.firebasestorage.app",
      messagingSenderId: "1064401778915",
      appId: "1:1064401778915:web:0cf6b5bf131c0c75276dd6"
    };
    
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const appId = 'taejun-lab';

    function App() {
      const [user, setUser] = useState(null);
      const [loading, setLoading] = useState(true);
      const [email, setEmail] = useState('');
      const [password, setPassword] = useState('');
      const [isSignUp, setIsSignUp] = useState(false);
      const [errorMsg, setErrorMsg] = useState('');

      const [activeTab, setActiveTab] = useState('archives');
      const [archives, setArchives] = useState([]);
      const [notes, setNotes] = useState([]);
      
      const [newFileName, setNewFileName] = useState('');
      const [newFileUrl, setNewFileUrl] = useState('');

      useEffect(() => {
        const unsub = onAuthStateChanged(auth, (u) => { setUser(u); setLoading(false); });
        return () => unsub();
      }, []);

      useEffect(() => {
        if (!user) return;
        const archivesRef = collection(db, 'artifacts', appId, 'users', user.uid, 'archives');
        const notesRef = collection(db, 'artifacts', appId, 'users', user.uid, 'notes');

        const unsubA = onSnapshot(archivesRef, (snap) => {
          setArchives(snap.docs.map(d => ({ id: d.id, ...d.data() })).sort((a,b)=>b.createdAt - a.createdAt));
        });
        const unsubN = onSnapshot(notesRef, (snap) => {
          setNotes(snap.docs.map(d => ({ id: d.id, ...d.data() })).sort((a,b)=>b.createdAt - a.createdAt));
        });

        return () => { unsubA(); unsubN(); };
      }, [user]);

      const handleAuth = async (e) => {
        e.preventDefault();
        try {
          if (isSignUp) await createUserWithEmailAndPassword(auth, email, password);
          else await signInWithEmailAndPassword(auth, email, password);
        } catch (err) { setErrorMsg("접속 정보가 일치하지 않습니다."); }
      };

      const addArchive = async (e) => {
        e.preventDefault();
        if(!newFileName || !newFileUrl) return;
        await addDoc(collection(db, 'artifacts', appId, 'users', user.uid, 'archives'), {
          name: newFileName, url: newFileUrl, createdAt: Date.now()
        });
        setNewFileName(''); setNewFileUrl('');
      };

      if (loading) return <div className="h-screen flex items-center justify-center font-bold text-blue-600">시스템 로딩 중...</div>;

      if (!user) {
        return (
          <div className="min-h-screen bg-[#f0f2f5] flex items-center justify-center p-4">
            <div className="max-w-md w-full bg-white rounded-xl shadow-xl p-8">
              <h1 className="text-2xl font-bold text-center text-blue-700 mb-2">태준실험실 자료관리</h1>
              <p className="text-center text-gray-500 mb-8 text-sm">로그인하여 시스템을 시작하세요</p>
              <form onSubmit={handleAuth} className="space-y-4">
                <div>
                  <label className="text-xs font-bold text-gray-600 ml-1">아이디 (이메일)</label>
                  <input type="email" value={email} onChange={e=>setEmail(e.target.value)} className="w-full border border-gray-300 rounded-lg p-3 mt-1 focus:ring-2 focus:ring-blue-500 outline-none" required />
                </div>
                <div>
                  <label className="text-xs font-bold text-gray-600 ml-1">비밀번호</label>
                  <input type="password" value={password} onChange={e=>setPassword(e.target.value)} className="w-full border border-gray-300 rounded-lg p-3 mt-1 focus:ring-2 focus:ring-blue-500 outline-none" required />
                </div>
                {errorMsg && <p className="text-red-500 text-xs text-center">{errorMsg}</p>}
                <button className="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg transition-colors shadow-md">
                  {isSignUp ? "연구원 등록" : "로그인"}
                </button>
              </form>
              <button onClick={()=>setIsSignUp(!isSignUp)} className="w-full mt-6 text-sm text-blue-600 hover:underline">
                {isSignUp ? "계정이 이미 있나요? 로그인" : "처음인가요? 회원가입하기"}
              </button>
            </div>
          </div>
        );
      }

      return (
        <div className="min-h-screen flex flex-col md:flex-row">
          {/* 사이드바 */}
          <aside className="w-full md:w-72 bg-[#1e293b] text-white p-6 flex flex-col">
            <div className="flex items-center gap-3 mb-10">
              <div className="p-2 bg-blue-600 rounded-lg"><Beaker size={24} color="white"/></div>
              <h1 className="text-xl font-bold tracking-tight">태준실험실 Pro</h1>
            </div>
            
            <nav className="flex-1 space-y-1">
              <button onClick={()=>setActiveTab('archives')} className={`w-full flex items-center gap-3 px-4 py-3 rounded-lg transition-all ${activeTab === 'archives' ? 'bg-blue-600 shadow-lg' : 'text-gray-400 hover:bg-gray-800'}`}>
                <FileText size={20}/> <span>자료 보관소</span>
              </button>
              <button onClick={()=>setActiveTab('notes')} className={`w-full flex items-center gap-3 px-4 py-3 rounded-lg transition-all ${activeTab === 'notes' ? 'bg-blue-600 shadow-lg' : 'text-gray-400 hover:bg-gray-800'}`}>
                <Beaker size={20} color="currentColor"/> <span>연구 일지</span>
              </button>
            </nav>

            <div className="mt-auto pt-6 border-t border-gray-700">
              <div className="text-xs text-gray-400 mb-4 px-2 truncate">{user.email}</div>
              <button onClick={()=>signOut(auth)} className="w-full flex items-center justify-center gap-2 bg-gray-800 hover:bg-red-900/40 text-gray-300 py-2.5 rounded-lg transition-all text-sm font-medium">
                <LogOut size={16}/> 시스템 로그아웃
              </button>
            </div>
          </aside>

          {/* 메인 영역 */}
          <main className="flex-1 p-6 md:p-10 overflow-y-auto">
            {activeTab === 'archives' ? (
              <div className="max-w-5xl mx-auto">
                <div className="flex justify-between items-end mb-8">
                  <div>
                    <h2 className="text-3xl font-bold text-gray-800">자료 보관소</h2>
                    <p className="text-gray-500 mt-1 text-sm">중요 문서와 파일 링크를 안전하게 관리합니다.</p>
                  </div>
                </div>

                <div className="bg-white rounded-2xl shadow-sm border border-gray-200 p-6 mb-8">
                  <h3 className="text-sm font-bold text-gray-700 mb-4 uppercase tracking-wider">새 자료 등록</h3>
                  <form onSubmit={addArchive} className="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <input type="text" placeholder="자료 명칭 (예: 24년 정산서)" value={newFileName} onChange={e=>setNewFileName(e.target.value)} className="md:col-span-1 border border-gray-300 rounded-lg px-4 py-2.5 focus:ring-2 focus:ring-blue-500 outline-none" required />
                    <input type="url" placeholder="파일 링크 (구글드라이브 등)" value={newFileUrl} onChange={e=>setNewFileUrl(e.target.value)} className="md:col-span-1 border border-gray-300 rounded-lg px-4 py-2.5 focus:ring-2 focus:ring-blue-500 outline-none" required />
                    <button type="submit" className="bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-lg py-2.5 transition-all shadow-md">자료 추가하기</button>
                  </form>
                </div>

                <div className="bg-white rounded-2xl shadow-sm border border-gray-200 overflow-hidden">
                  <table className="w-full text-left">
                    <thead className="bg-gray-50 border-b border-gray-200">
                      <tr>
                        <th className="px-6 py-4 text-xs font-bold text-gray-500 uppercase">자료 이름</th>
                        <th className="px-6 py-4 text-xs font-bold text-gray-500 uppercase">등록일</th>
                        <th className="px-6 py-4 text-xs font-bold text-gray-500 uppercase text-right">관리</th>
                      </tr>
                    </thead>
                    <tbody className="divide-y divide-gray-100">
                      {archives.map(item => (
                        <tr key={item.id} className="hover:bg-blue-50/30 transition-colors">
                          <td className="px-6 py-5">
                            <div className="flex items-center gap-3">
                              <div className="text-blue-600"><FileText size={22}/></div>
                              <span className="font-semibold text-gray-800">{item.name}</span>
                            </div>
                          </td>
                          <td className="px-6 py-5 text-sm text-gray-500">{new Date(item.createdAt).toLocaleDateString()}</td>
                          <td className="px-6 py-5 text-right">
                            <div className="flex justify-end gap-3">
                              <a href={item.url} target="_blank" rel="noreferrer" className="flex items-center gap-1 text-blue-600 hover:text-blue-800 font-bold text-sm bg-blue-50 px-3 py-1.5 rounded-lg transition-all">
                                <ExternalLink size={14}/> 열기
                              </a>
                              <button onClick={()=>deleteDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'archives', item.id))} className="text-gray-400 hover:text-red-600 p-1.5 transition-all">
                                <Trash size={18}/>
                              </button>
                            </div>
                          </td>
                        </tr>
                      ))}
                      {archives.length === 0 && <tr><td colSpan="3" className="px-6 py-20 text-center text-gray-400 italic font-serif">현재 보관된 자료가 없습니다.</td></tr>}
                    </tbody>
                  </table>
                </div>
              </div>
            ) : (
              <div className="max-w-4xl mx-auto">
                <h2 className="text-3xl font-bold text-gray-800 mb-8">연구 일지</h2>
                <div className="text-center py-20 bg-white rounded-2xl border border-dashed border-gray-300 text-gray-400">
                  연구 일지 기능은 현재 점검 중입니다. <br/> 자료 보관소 기능을 먼저 이용해 보세요!
                </div>
              </div>
            )}
          </main>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
