<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>태준실험실 - 전문 자료관리시스템</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Firebase Compat (가장 안정적인 라이브러리 조합) -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>

  <style>
    @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }
    .animate-shake { animation: shake 0.3s ease-in-out; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 20px; }
    
    .spinner {
      border: 3px solid rgba(0, 0, 0, 0.1);
      width: 32px;
      height: 32px;
      border-radius: 50%;
      border-left-color: #2563eb;
      animation: spin 1s linear infinite;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    /* 노션 스타일 입력창 커스텀 */
    .notion-item:focus-within { background-color: #f1f5f9; border-radius: 4px; }
  </style>
</head>
<body class="bg-[#f8fafc] text-slate-800 font-sans antialiased">
  <div id="root">
    <div class="h-screen flex flex-col items-center justify-center bg-white">
      <div class="spinner mb-4"></div>
      <p class="text-slate-400 font-bold animate-pulse text-xs tracking-widest uppercase">System Initializing...</p>
    </div>
  </div>

  <script type="text/babel">
    const firebaseConfig = {
      apiKey: "AIzaSyCfHF_0xj-9qdD-VcwDCv_gJtQhDtmvSXQ",
      authDomain: "taejun-lab.firebaseapp.com",
      projectId: "taejun-lab",
      storageBucket: "taejun-lab.firebasestorage.app",
      messagingSenderId: "1064401778915",
      appId: "1:1064401778915:web:0cf6b5bf131c0c75276dd6"
    };
    
    // 앱 초기화 에러 방지
    let auth, db, storage;
    try {
      if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
      auth = firebase.auth();
      db = firebase.firestore();
      storage = firebase.storage();
    } catch (e) {
      console.error("Firebase Init Error", e);
    }

    const { useState, useEffect, useRef } = React;

    const Icons = {
      Beaker: ({size=24}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M4.5 3h15"/><path d="M6 3v16a2 2 0 0 0 2 2h8a2 2 0 0 0 2-2V3"/><path d="M6 14h12"/></svg>,
      File: ({size=20}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/></svg>,
      Check: ({size=20}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><path d="m9 12 2 2 4-4"/></svg>,
      Trash: ({size=18}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>,
      LogOut: ({size=18}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" x2="9" y1="12" y2="12"/></svg>,
      Plus: ({size=18}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>,
      Menu: ({size=24}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="4" x2="20" y1="12" y2="12"/><line x1="4" x2="20" y1="6" y2="6"/><line x1="4" x2="20" y1="18" y2="18"/></svg>,
      Cloud: ({size=32}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M4 14.899A7 7 0 1 1 15.71 8h1.79a4.5 4.5 0 0 1 2.5 8.242"/><path d="M12 12v9"/><path d="M16 16l-4-4-4 4"/></svg>
    };

    function App() {
      const [user, setUser] = useState(null);
      const [loading, setLoading] = useState(true);
      const [loginId, setLoginId] = useState('');
      const [loginPw, setLoginPw] = useState('');
      const [errorMsg, setErrorMsg] = useState('');
      const [sidebarOpen, setSidebarOpen] = useState(false);

      const [activeTab, setActiveTab] = useState('checklist');
      const [archives, setArchives] = useState([]);
      const [weeklyChecklists, setWeeklyChecklists] = useState([]);
      const [selectedWeekId, setSelectedWeekId] = useState(null);

      const [isUploading, setIsUploading] = useState(false);
      const [isDragging, setIsDragging] = useState(false);

      const appId = 'taejun-lab';

      useEffect(() => {
        const unsub = auth.onAuthStateChanged((u) => { 
          setUser(u); 
          setLoading(false); 
        });
        // 5초 후에도 로딩이 안 풀리면 강제로 로딩 해제 (네트워크 오류 대비)
        const timer = setTimeout(() => setLoading(false), 5000);
        return () => { unsub(); clearTimeout(timer); };
      }, []);

      useEffect(() => {
        if (!user) return;
        const userPath = `artifacts/${appId}/users/${user.uid}`;
        
        const unsubA = db.collection(`${userPath}/archives`).onSnapshot(snap => {
          setArchives(snap.docs.map(d => ({ id: d.id, ...d.data() })).sort((a,b)=>b.createdAt - a.createdAt));
        });

        const unsubC = db.collection(`${userPath}/checklists`).onSnapshot(snap => {
          const list = snap.docs.map(d => ({ id: d.id, ...d.data() })).sort((a,b)=>b.order - a.order);
          setWeeklyChecklists(list);
          if (list.length > 0 && !selectedWeekId) setSelectedWeekId(list[0].id);
        });

        return () => { unsubA(); unsubC(); };
      }, [user]);

      const handleLogin = async (e) => {
        e.preventDefault();
        setErrorMsg('');
        const finalEmail = loginId.includes('@') ? loginId : `${loginId}@taejun.lab`;
        try {
          await auth.signInWithEmailAndPassword(finalEmail, loginPw);
        } catch (err) {
          setErrorMsg("ID 또는 비밀번호가 올바르지 않습니다.");
        }
      };

      // --- 체크리스트 주차 관리 ---
      const addNewWeek = async () => {
        const weekName = prompt("주차 정보를 입력하세요 (예: 4월 5주차)");
        if (!weekName) return;
        const userPath = `artifacts/${appId}/users/${user.uid}`;
        await db.collection(`${userPath}/checklists`).add({
          title: weekName,
          items: [{ id: Date.now().toString(), text: '', completed: false, level: 0, bold: false }],
          createdAt: Date.now(),
          order: Date.now()
        });
      };

      const updateChecklist = async (weekId, newItems) => {
        const userPath = `artifacts/${appId}/users/${user.uid}`;
        await db.doc(`${userPath}/checklists/${weekId}`).update({ items: newItems });
      };

      const handleItemChange = (weekId, index, field, value) => {
        const week = weeklyChecklists.find(w => w.id === weekId);
        const newItems = [...week.items];
        newItems[index][field] = value;
        updateChecklist(weekId, newItems);
      };

      const handleKeyDown = (e, weekId, index) => {
        const week = weeklyChecklists.find(w => w.id === weekId);
        let newItems = [...week.items];
        const item = newItems[index];

        if (e.key === 'Enter') {
          e.preventDefault();
          const newItem = { id: Math.random().toString(36).substr(2, 9), text: '', completed: false, level: item.level, bold: false };
          newItems.splice(index + 1, 0, newItem);
          updateChecklist(weekId, newItems);
          setTimeout(() => document.getElementById(`input-${index + 1}`)?.focus(), 50);
        } else if (e.key === 'Tab') {
          e.preventDefault();
          if (!e.shiftKey) { if (item.level < 4) item.level += 1; }
          else { if (item.level > 0) item.level -= 1; }
          updateChecklist(weekId, newItems);
        } else if (e.key === 'Backspace' && item.text === '' && newItems.length > 1) {
          e.preventDefault();
          newItems.splice(index, 1);
          updateChecklist(weekId, newItems);
          setTimeout(() => document.getElementById(`input-${index - 1}`)?.focus(), 50);
        } else if (e.ctrlKey && (e.key === 'b' || e.key === 'B')) {
          e.preventDefault();
          item.bold = !item.bold;
          updateChecklist(weekId, newItems);
        }
      };

      // --- 파일 업로드 (PDF 포함) ---
      const uploadFile = async (file) => {
        if (!file || !user) return;
        setIsUploading(true);
        try {
          const fileRef = storage.ref(`artifacts/${appId}/users/${user.uid}/files/${Date.now()}_${file.name}`);
          const snapshot = await fileRef.put(file);
          const downloadURL = await snapshot.ref.getDownloadURL();
          
          const userPath = `artifacts/${appId}/users/${user.uid}`;
          await db.collection(`${userPath}/archives`).add({
            name: file.name,
            url: downloadURL,
            type: file.type,
            size: (file.size / (1024 * 1024)).toFixed(2) + ' MB',
            createdAt: Date.now()
          });
          alert("파일 전송 완료!");
        } catch (err) {
          console.error(err);
          alert("업로드 실패: 파이어베이스 스토리지 설정을 확인해 주세요. (Blaze 요금제 전환 필요)");
        } finally {
          setIsUploading(false);
          setIsDragging(false);
        }
      };

      if (loading) return null;

      if (!user) {
        return (
          <div className="min-h-screen bg-slate-100 flex items-center justify-center p-6">
            <div className="max-w-md w-full bg-white rounded-[2.5rem] shadow-2xl p-10 border border-white">
              <div className="flex justify-center mb-8">
                <div className="p-4 bg-blue-600 rounded-2xl shadow-xl shadow-blue-200"><Icons.Beaker size={40} color="white"/></div>
              </div>
              <h1 className="text-2xl font-black text-center text-slate-800 mb-1 tracking-tighter uppercase leading-none">Taejun Lab</h1>
              <p className="text-center text-slate-400 mb-10 text-[10px] font-bold tracking-[0.3em] uppercase">Private Console</p>
              
              <form onSubmit={handleLogin} className="space-y-6">
                <input type="text" value={loginId} onChange={e=>setLoginId(e.target.value)} placeholder="Researcher ID" className="w-full bg-slate-50 border border-slate-100 rounded-xl p-4 focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 outline-none transition-all font-bold" required />
                <input type="password" value={loginPw} onChange={e=>setLoginPw(e.target.value)} placeholder="Security Key" className="w-full bg-slate-50 border border-slate-100 rounded-xl p-4 focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 outline-none transition-all font-bold" required />
                {errorMsg && <div className="bg-red-50 text-red-500 text-[11px] text-center font-bold py-3 px-4 rounded-xl animate-shake">{errorMsg}</div>}
                <button className="w-full bg-blue-600 hover:bg-blue-700 text-white font-black py-4 rounded-xl transition-all shadow-xl shadow-blue-200 text-base active:scale-95 uppercase tracking-widest mt-4">Login</button>
              </form>
            </div>
          </div>
        );
      }

      return (
        <div className="min-h-screen flex flex-col md:flex-row bg-[#f8fafc]">
          {/* Mobile Header */}
          <header className="md:hidden flex items-center justify-between p-4 bg-[#1e293b] text-white sticky top-0 z-50">
            <div className="flex items-center gap-2"><Icons.Beaker size={18} color="white"/><span className="font-black text-base uppercase tracking-tighter">Lab</span></div>
            <button onClick={()=>setSidebarOpen(!sidebarOpen)} className="p-2 hover:bg-slate-700 rounded-lg"><Icons.Menu size={22}/></button>
          </header>

          {/* Sidebar */}
          <aside className={`${sidebarOpen ? 'flex' : 'hidden'} md:flex fixed md:relative z-40 inset-0 md:inset-auto w-full md:w-64 bg-[#1e293b] text-white p-5 flex-col shadow-2xl transition-all`}>
            <div className="flex items-center gap-3 mb-12 mt-2">
              <div className="p-2 bg-blue-600 rounded-xl"><Icons.Beaker size={22} color="white"/></div>
              <h1 className="text-lg font-black tracking-tighter uppercase">Taejun Lab</h1>
            </div>
            
            <nav className="flex-1 space-y-1.5">
              <button onClick={()=>{setActiveTab('checklist'); setSidebarOpen(false);}} className={`w-full flex items-center gap-4 px-5 py-3.5 rounded-xl transition-all font-bold text-sm ${activeTab === 'checklist' ? 'bg-blue-600 shadow-lg text-white' : 'text-slate-400 hover:bg-slate-800'}`}>
                <Icons.Check size={18}/> <span>체크리스트</span>
              </button>
              <button onClick={()=>{setActiveTab('archives'); setSidebarOpen(false);}} className={`w-full flex items-center gap-4 px-5 py-3.5 rounded-xl transition-all font-bold text-sm ${activeTab === 'archives' ? 'bg-blue-600 shadow-lg text-white' : 'text-slate-400 hover:bg-slate-800'}`}>
                <Icons.File size={18}/> <span>자료 보관소</span>
              </button>
            </nav>

            <div className="mt-auto pt-6 border-t border-slate-700/50 text-[10px] text-slate-500 font-bold uppercase text-center mb-4">User: {user.email.split('@')[0]}</div>
            <button onClick={()=>auth.signOut()} className="w-full flex items-center justify-center gap-2 bg-slate-800/40 hover:bg-red-500/10 hover:text-red-400 text-slate-400 py-3.5 rounded-xl transition-all text-[10px] font-black uppercase border border-slate-700/50 active:scale-95"><Icons.LogOut size={12}/> Sign Out</button>
          </aside>

          {/* Main Area */}
          <main className="flex-1 p-5 md:p-12 overflow-y-auto">
            {activeTab === 'checklist' ? (
              <div className="max-w-4xl mx-auto">
                <div className="flex flex-col sm:flex-row sm:items-center justify-between gap-6 mb-10">
                  <div>
                    <h2 className="text-3xl font-black text-slate-800 tracking-tighter uppercase">Research Log</h2>
                    <p className="text-slate-400 mt-1 font-bold text-sm leading-none">주차별 업무 동기화</p>
                  </div>
                  <button onClick={addNewWeek} className="bg-blue-600 hover:bg-blue-700 text-white font-black px-6 py-3 rounded-xl shadow-lg shadow-blue-100 flex items-center gap-2 transition-all text-sm active:scale-95"><Icons.Plus size={18}/> 주차 추가</button>
                </div>

                <div className="flex flex-wrap gap-2 mb-8">
                  {weeklyChecklists.map(week => (
                    <button key={week.id} onClick={()=>setSelectedWeekId(week.id)} className={`px-5 py-2.5 rounded-xl font-black text-[11px] transition-all border-2 ${selectedWeekId === week.id ? 'bg-slate-800 text-white border-slate-800' : 'bg-white text-slate-400 border-slate-100 hover:border-slate-300'}`}>{week.title}</button>
                  ))}
                </div>

                {selectedWeekId && weeklyChecklists.find(w => w.id === selectedWeekId) && (
                  <div className="bg-white rounded-[2.5rem] shadow-xl shadow-slate-200/40 border border-slate-100 p-8 md:p-12 relative group min-h-[500px]">
                    <button onClick={async () => confirm("삭제하시겠습니까?") && db.doc(`artifacts/${appId}/users/${user.uid}/checklists/${selectedWeekId}`).delete()} className="absolute top-8 right-8 text-slate-200 hover:text-red-500 transition-all opacity-0 group-hover:opacity-100"><Icons.Trash size={18}/></button>
                    <h3 className="text-2xl font-black text-slate-800 mb-10 border-b-4 border-blue-600 inline-block pb-1 tracking-tighter">{weeklyChecklists.find(w => w.id === selectedWeekId).title}</h3>
                    
                    <div className="space-y-1">
                      {weeklyChecklists.find(w => w.id === selectedWeekId).items.map((item, idx) => (
                        <div key={item.id} className="flex items-start group/item transition-all notion-item" style={{ marginLeft: `${item.level * 28}px` }}>
                          <button onClick={() => handleItemChange(selectedWeekId, idx, 'completed', !item.completed)} className={`mt-1.5 w-5 h-5 rounded-md border-2 flex items-center justify-center transition-all flex-shrink-0 ${item.completed ? 'bg-blue-600 border-blue-600 text-white' : 'border-slate-200 bg-white hover:border-blue-400'}`}>
                            {item.completed && <svg className="w-3 h-3 fill-current" viewBox="0 0 20 20"><path d="M0 11l2-2 5 5L18 3l2 2L7 18z"/></svg>}
                          </button>
                          <input id={`input-${idx}`} type="text" value={item.text} onChange={(e) => handleItemChange(selectedWeekId, idx, 'text', e.target.value)} onKeyDown={(e) => handleKeyDown(e, selectedWeekId, idx)} className={`flex-1 bg-transparent border-none outline-none px-3 py-1 text-base transition-all ${item.completed ? 'text-slate-300 line-through font-medium' : 'text-slate-700 font-bold'} ${item.bold ? 'font-black underline' : ''}`} placeholder="내용 입력..." autoComplete="off" />
                        </div>
                      ))}
                    </div>
                  </div>
                )}
              </div>
            ) : (
              <div className="max-w-5xl mx-auto">
                <div className="mb-10 text-center md:text-left">
                  <h2 className="text-4xl font-black text-slate-800 tracking-tighter uppercase leading-none">Archives</h2>
                  <p className="text-slate-400 mt-2 font-bold text-lg leading-none">드래그 앤 드롭 파일 클라우드</p>
                </div>

                <div onDragOver={(e) => { e.preventDefault(); setIsDragging(true); }} onDragLeave={() => setIsDragging(false)} onDrop={(e) => { e.preventDefault(); uploadFile(e.dataTransfer.files[0]); }} className={`bg-white rounded-[3rem] p-12 border-4 border-dashed transition-all mb-12 flex flex-col items-center justify-center text-center ${isDragging ? 'border-blue-600 bg-blue-50' : 'border-slate-100 hover:border-blue-200'}`}>
                  <div className={`p-6 rounded-3xl mb-4 transition-all ${isUploading ? 'bg-slate-50' : 'bg-blue-50 text-blue-600'}`}>{isUploading ? <div className="spinner"></div> : <Icons.Cloud size={32}/>}</div>
                  <h3 className="text-xl font-black text-slate-800 mb-2">{isUploading ? "파일 전송 중..." : "PDF 또는 이미지를 이곳에 끌어다 놓으세요"}</h3>
                  <label className="bg-[#1e293b] hover:bg-slate-800 text-white font-black px-8 py-3 rounded-xl cursor-pointer transition-all active:scale-95 text-xs mt-4">내 컴퓨터 탐색<input type="file" className="hidden" onChange={(e) => uploadFile(e.target.files[0])} disabled={isUploading} /></label>
                </div>

                <div className="bg-white rounded-[2.5rem] shadow-sm border border-slate-100 overflow-hidden">
                  <table className="w-full text-left min-w-[600px]">
                    <thead className="bg-slate-50/50 border-b border-slate-100 text-[10px] font-black text-slate-400 uppercase tracking-widest">
                      <tr><th className="px-8 py-5">파일명</th><th className="px-8 py-5 text-center">크기</th><th className="px-8 py-5 text-center">날짜</th><th className="px-8 py-5 text-right">옵션</th></tr>
                    </thead>
                    <tbody className="divide-y divide-slate-50">
                      {archives.map(item => (
                        <tr key={item.id} className="hover:bg-blue-50/40 transition-all">
                          <td className="px-8 py-6 flex items-center gap-4 font-extrabold text-base text-slate-700 tracking-tight"><Icons.File size={18} className="text-slate-400"/><span>{item.name}</span></td>
                          <td className="px-8 py-6 text-xs text-slate-400 font-bold text-center">{item.size || 'N/A'}</td>
                          <td className="px-8 py-6 text-xs text-slate-400 font-bold text-center uppercase">{new Date(item.createdAt).toLocaleDateString()}</td>
                          <td className="px-8 py-6 text-right"><div className="flex justify-end gap-3"><a href={item.url} target="_blank" rel="noreferrer" className="bg-blue-50 text-blue-600 hover:bg-blue-600 hover:text-white font-black text-[10px] px-6 py-2 rounded-xl transition-all border border-blue-100 shadow-sm">VIEW</a><button onClick={()=>confirm("삭제?") && db.doc(`artifacts/${appId}/users/${user.uid}/archives/${item.id}`).delete()} className="text-slate-200 hover:text-red-500 p-2"><Icons.Trash size={18}/></button></div></td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              </div>
            )}
          </main>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
