<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>태준실험실 - 전문 자료관리시스템</title>
  
  <!-- 안정적인 라이브러리 로드 (가장 보편적인 방식) -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Firebase Compat 모드 (호환성 극대화) -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>

  <style>
    @font-face {
      font-family: 'Pretendard';
      src: url('https://cdn.jsdelivr.net/gh/Project-Noonnu/noonfonts_2107@1.1/Pretendard-Regular.woff') format('woff');
      font-weight: normal;
      font-style: normal;
    }
    body { font-family: 'Pretendard', sans-serif; }
    
    .spinner {
      border: 3px solid rgba(0, 0, 0, 0.1);
      width: 32px;
      height: 32px;
      border-radius: 50%;
      border-left-color: #2563eb;
      animation: spin 1s linear infinite;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    
    .notion-item:focus-within { background-color: #f1f5f9; border-radius: 6px; }
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
  </style>
</head>
<body class="bg-[#f8fafc] text-slate-800 antialiased">
  <div id="root">
    <div class="h-screen flex flex-col items-center justify-center">
      <div class="spinner mb-4"></div>
      <p class="text-slate-400 font-bold text-xs tracking-widest uppercase animate-pulse">System Initializing...</p>
    </div>
  </div>

  <script type="text/babel">
    const firebaseConfig = {
      apiKey: "AIzaSyCfHF_0xj-9qdD-VcwDCv_gJtQhDtmvSXQ",
      authDomain: "taejun-lab.firebaseapp.com",
      projectId: "taejun-lab",
      storageBucket: "taejun-lab.firebasestorage.app",
      messagingSenderId: "1064401778915",
      appId: "1:1064401778915:web:0cf6b5bf131c0c75276dd6"
    };
    
    // 초기화 시 에러 방지 처리
    if (!firebase.apps.length) {
      firebase.initializeApp(firebaseConfig);
    }
    const auth = firebase.auth();
    const db = firebase.firestore();
    const storage = firebase.storage();
    const appId = 'taejun-lab';

    const { useState, useEffect, useRef } = React;

    const Icons = {
      Beaker: ({size=24}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M4.5 3h15"/><path d="M6 3v16a2 2 0 0 0 2 2h8a2 2 0 0 0 2-2V3"/><path d="M6 14h12"/></svg>,
      File: ({size=20}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/></svg>,
      Check: ({size=20}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><path d="m9 12 2 2 4-4"/></svg>,
      Trash: ({size=18}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>,
      LogOut: ({size=18}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" x2="9" y1="12" y2="12"/></svg>,
      Plus: ({size=18}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>,
      Menu: ({size=24}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="4" x2="20" y1="12" y2="12"/><line x1="4" x2="20" y1="6" y2="6"/><line x1="4" x2="20" y1="18" y2="18"/></svg>,
      Cloud: ({size=32}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M4 14.899A7 7 0 1 1 15.71 8h1.79a4.5 4.5 0 0 1 2.5 8.242"/><path d="M12 12v9"/><path d="M16 16l-4-4-4 4"/></svg>
    };

    function App() {
      const [user, setUser] = useState(null);
      const [loading, setLoading] = useState(true);
      const [loginId, setLoginId] = useState('');
      const [loginPw, setLoginPw] = useState('');
      const [errorMsg, setErrorMsg] = useState('');
      const [sidebarOpen, setSidebarOpen] = useState(false);

      const [activeTab, setActiveTab] = useState('checklist');
      const [archives, setArchives] = useState([]);
      const [weeklyChecklists, setWeeklyChecklists] = useState([]);
      const [selectedWeekId, setSelectedWeekId] = useState(null);

      const [isUploading, setIsUploading] = useState(false);
      const [isDragging, setIsDragging] = useState(false);

      useEffect(() => {
        const unsub = auth.onAuthStateChanged((u) => { 
          setUser(u); 
          setLoading(false); 
        });
        const safety = setTimeout(() => setLoading(false), 3000);
        return () => { unsub(); clearTimeout(safety); };
      }, []);

      useEffect(() => {
        if (!user) return;
        const userPath = `artifacts/${appId}/users/${user.uid}`;
        
        const unsubA = db.collection(`${userPath}/archives`).onSnapshot(snap => {
          setArchives(snap.docs.map(d => ({ id: d.id, ...d.data() })).sort((a,b)=>b.createdAt - a.createdAt));
        });

        const unsubC = db.collection(`${userPath}/checklists`).onSnapshot(snap => {
          const list = snap.docs.map(d => ({ id: d.id, ...d.data() })).sort((a,b)=>b.order - a.order);
          setWeeklyChecklists(list);
          if (list.length > 0 && !selectedWeekId) setSelectedWeekId(list[0].id);
        });

        return () => { unsubA(); unsubC(); };
      }, [user]);

      const handleLogin = async (e) => {
        e.preventDefault();
        setErrorMsg('');
        const finalEmail = loginId.includes('@') ? loginId : `${loginId}@taejun.lab`;
        try {
          await auth.signInWithEmailAndPassword(finalEmail, loginPw);
        } catch (err) {
          setErrorMsg("계정 또는 보안키가 일치하지 않습니다.");
        }
      };

      // --- Checklist Handlers ---
      const addNewWeek = async () => {
        const weekName = prompt("주차 명칭 (예: 5월 1주차)");
        if (!weekName) return;
        const userPath = `artifacts/${appId}/users/${user.uid}`;
        await db.collection(`${userPath}/checklists`).add({
          title: weekName,
          items: [{ id: Date.now().toString(), text: '', completed: false, level: 0, bold: false }],
          createdAt: Date.now(),
          order: Date.now()
        });
      };

      const updateItems = async (weekId, newItems) => {
        const userPath = `artifacts/${appId}/users/${user.uid}`;
        await db.doc(`${userPath}/checklists/${weekId}`).update({ items: newItems });
      };

      const handleKeyDown = (e, weekId, index) => {
        const week = weeklyChecklists.find(w => w.id === weekId);
        let newItems = [...week.items];
        const item = newItems[index];

        if (e.key === 'Enter') {
          e.preventDefault();
          const newItem = { id: Math.random().toString(36).substr(2, 9), text: '', completed: false, level: item.level, bold: false };
          newItems.splice(index + 1, 0, newItem);
          updateItems(weekId, newItems);
          setTimeout(() => document.getElementById(`notion-input-${index + 1}`)?.focus(), 50);
        } else if (e.key === 'Tab') {
          e.preventDefault();
          if (!e.shiftKey) { if (item.level < 4) item.level += 1; }
          else { if (item.level > 0) item.level -= 1; }
          updateItems(weekId, newItems);
        } else if (e.key === 'Backspace' && item.text === '' && newItems.length > 1) {
          e.preventDefault();
          newItems.splice(index, 1);
          updateItems(weekId, newItems);
          setTimeout(() => document.getElementById(`notion-input-${index - 1}`)?.focus(), 50);
        } else if (e.ctrlKey && (e.key.toLowerCase() === 'b')) {
          e.preventDefault();
          item.bold = !item.bold;
          updateItems(weekId, newItems);
        }
      };

      // --- File Upload Handlers ---
      const uploadFile = async (file) => {
        if (!file || !user) return;
        setIsUploading(true);
        try {
          const fileRef = storage.ref(`artifacts/${appId}/users/${user.uid}/files/${Date.now()}_${file.name}`);
          const snapshot = await fileRef.put(file);
          const downloadURL = await snapshot.ref.getDownloadURL();
          
          await db.collection(`artifacts/${appId}/users/${user.uid}/archives`).add({
            name: file.name,
            url: downloadURL,
            size: (file.size / (1024 * 1024)).toFixed(2) + ' MB',
            createdAt: Date.now()
          });
        } catch (err) {
          alert("업로드 실패: Firebase Storage 설정을 확인하세요.");
        } finally {
          setIsUploading(false);
          setIsDragging(false);
        }
      };

      if (loading) return null;

      if (!user) {
        return (
          <div className="min-h-screen bg-slate-100 flex items-center justify-center p-6">
            <div className="max-w-md w-full bg-white rounded-[2.5rem] shadow-2xl p-10 md:p-14 border border-white">
              <div className="flex justify-center mb-8">
                <div className="p-4 bg-blue-600 rounded-2xl shadow-xl shadow-blue-200"><Icons.Beaker size={44} color="white"/></div>
              </div>
              <h1 className="text-3xl font-black text-center text-slate-800 mb-2 tracking-tighter uppercase leading-none">Taejun Lab</h1>
              <p className="text-center text-slate-400 mb-12 text-[10px] font-bold tracking-[0.4em] uppercase">Private System Access</p>
              
              <form onSubmit={handleLogin} className="space-y-6">
                <input type="text" value={loginId} onChange={e=>setLoginId(e.target.value)} placeholder="Identity ID" className="w-full bg-slate-50 border border-slate-100 rounded-xl p-4 focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 outline-none transition-all font-bold" required />
                <input type="password" value={loginPw} onChange={e=>setLoginPw(e.target.value)} placeholder="Security Key" className="w-full bg-slate-50 border border-slate-100 rounded-xl p-4 focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 outline-none transition-all font-bold" required />
                {errorMsg && <div className="bg-red-50 text-red-500 text-[11px] text-center font-bold py-3 px-4 rounded-xl animate-shake">{errorMsg}</div>}
                <button className="w-full bg-blue-600 hover:bg-blue-700 text-white font-black py-4 rounded-xl transition-all shadow-xl shadow-blue-200 text-base active:scale-95 uppercase tracking-widest mt-2">Login</button>
              </form>
            </div>
          </div>
        );
      }

      return (
        <div className="min-h-screen flex flex-col md:flex-row bg-[#f8fafc]">
          {/* Mobile Header */}
          <header className="md:hidden flex items-center justify-between p-4 bg-[#1e293b] text-white sticky top-0 z-50">
            <div className="flex items-center gap-2"><Icons.Beaker size={18} color="white"/><span className="font-black text-lg uppercase tracking-tighter">Lab</span></div>
            <button onClick={()=>setSidebarOpen(!sidebarOpen)} className="p-2 hover:bg-slate-700 rounded-lg"><Icons.Menu size={22}/></button>
          </header>

          {/* Sidebar */}
          <aside className={`${sidebarOpen ? 'flex' : 'hidden'} md:flex fixed md:relative z-40 inset-0 md:inset-auto w-full md:w-64 bg-[#1e293b] text-white p-6 flex-col shadow-2xl transition-all`}>
            <div className="flex items-center gap-3 mb-12 mt-2 px-2">
              <div className="p-2 bg-blue-600 rounded-xl shadow-lg"><Icons.Beaker size={22} color="white"/></div>
              <h1 className="text-xl font-black tracking-tighter uppercase leading-none">Taejun Lab</h1>
            </div>
            <nav className="flex-1 space-y-2">
              <button onClick={()=>{setActiveTab('checklist'); setSidebarOpen(false);}} className={`w-full flex items-center gap-4 px-6 py-4 rounded-2xl transition-all font-bold text-sm ${activeTab === 'checklist' ? 'bg-blue-600 shadow-xl text-white' : 'text-slate-400 hover:bg-slate-800'}`}>
                <Icons.Check size={20}/> <span>체크리스트</span>
              </button>
              <button onClick={()=>{setActiveTab('archives'); setSidebarOpen(false);}} className={`w-full flex items-center gap-4 px-6 py-4 rounded-2xl transition-all font-bold text-sm ${activeTab === 'archives' ? 'bg-blue-600 shadow-xl text-white' : 'text-slate-400 hover:bg-slate-800'}`}>
                <Icons.File size={20}/> <span>자료 보관소</span>
              </button>
            </nav>
            <div className="mt-auto pt-6 border-t border-slate-700/50 text-[10px] text-slate-500 font-bold uppercase text-center mb-6 tracking-widest">{user.email.split('@')[0]}</div>
            <button onClick={()=>auth.signOut()} className="w-full flex items-center justify-center gap-2 bg-slate-800/40 hover:bg-red-500/10 hover:text-red-400 text-slate-400 py-4 rounded-2xl transition-all text-[11px] font-black uppercase border border-slate-700/50 active:scale-95"><Icons.LogOut size={14}/> Sign Out</button>
          </aside>

          {/* Main Area */}
          <main className="flex-1 p-6 md:p-12 lg:p-20 overflow-y-auto">
            {activeTab === 'checklist' ? (
              <div className="max-w-4xl mx-auto">
                <div className="flex items-center justify-between gap-6 mb-12">
                  <div><h2 className="text-4xl font-black text-slate-800 tracking-tighter uppercase leading-none">Protocols</h2><p className="text-slate-400 mt-2 font-bold text-lg uppercase tracking-widest">업무 동기화</p></div>
                  <button onClick={addNewWeek} className="bg-blue-600 hover:bg-blue-700 text-white font-black px-6 py-3.5 rounded-2xl shadow-xl shadow-blue-100 flex items-center gap-2 transition-all active:scale-95"><Icons.Plus size={18}/> 주차 추가</button>
                </div>
                <div className="flex flex-wrap gap-2 mb-10">
                  {weeklyChecklists.map(week => (
                    <button key={week.id} onClick={()=>setSelectedWeekId(week.id)} className={`px-6 py-3 rounded-2xl font-black text-[12px] transition-all border-2 ${selectedWeekId === week.id ? 'bg-slate-800 text-white border-slate-800 shadow-lg' : 'bg-white text-slate-400 border-slate-100 hover:border-slate-300'}`}>{week.title}</button>
                  ))}
                </div>
                {selectedWeekId && weeklyChecklists.find(w => w.id === selectedWeekId) && (
                  <div className="bg-white rounded-[3rem] shadow-2xl shadow-slate-200/40 border border-slate-50 p-8 md:p-14 relative group min-h-[500px]">
                    <button onClick={async () => confirm("이 주차의 데이터를 삭제할까요?") && db.doc(`artifacts/${appId}/users/${user.uid}/checklists/${selectedWeekId}`).delete()} className="absolute top-10 right-10 text-slate-200 hover:text-red-500 opacity-0 group-hover:opacity-100"><Icons.Trash size={22}/></button>
                    <h3 className="text-3xl font-black text-slate-800 mb-12 border-b-8 border-blue-600 inline-block pb-1 tracking-tighter uppercase">{weeklyChecklists.find(w => w.id === selectedWeekId).title}</h3>
                    <div className="space-y-1">
                      {weeklyChecklists.find(w => w.id === selectedWeekId).items.map((item, idx) => (
                        <div key={item.id} className="flex items-start group/item transition-all notion-item py-1" style={{ marginLeft: `${item.level * 32}px` }}>
                          <div className="mt-1.5 flex-shrink-0">
                            <input type="checkbox" checked={item.completed} onChange={() => {
                              const week = weeklyChecklists.find(w => w.id === selectedWeekId);
                              const newItems = [...week.items];
                              newItems[idx].completed = !newItems[idx].completed;
                              updateItems(selectedWeekId, newItems);
                            }} className="w-5 h-5 rounded-md border-2 border-slate-200 accent-blue-600" />
                          </div>
                          <input id={`notion-input-${idx}`} type="text" value={item.text} onChange={(e) => handleItemChange(selectedWeekId, idx, 'text', e.target.value)} onKeyDown={(e) => handleKeyDown(e, selectedWeekId, idx)} className={`flex-1 bg-transparent border-none outline-none px-4 py-1 text-xl transition-all ${item.completed ? 'text-slate-300 line-through font-medium' : 'text-slate-700 font-bold'} ${item.bold ? 'font-black underline decoration-blue-500/30' : ''}`} placeholder="기록..." autoComplete="off" />
                        </div>
                      ))}
                    </div>
                  </div>
                )}
              </div>
            ) : (
              <div className="max-w-5xl mx-auto">
                <div className="mb-14 text-center md:text-left"><h2 className="text-5xl font-black text-slate-800 tracking-tighter uppercase leading-none">Archives</h2><p className="text-slate-400 mt-4 font-bold text-xl uppercase tracking-[0.2em] leading-none">드래그 앤 드롭 파일 클라우드</p></div>
                <div onDragOver={(e) => { e.preventDefault(); setIsDragging(true); }} onDragLeave={() => setIsDragging(false)} onDrop={(e) => { e.preventDefault(); uploadFile(e.dataTransfer.files[0]); }} className={`bg-white rounded-[4rem] p-16 md:p-24 border-4 border-dashed transition-all mb-16 flex flex-col items-center justify-center text-center shadow-sm ${isDragging ? 'border-blue-600 bg-blue-50 shadow-xl shadow-blue-100' : 'border-slate-100 hover:border-blue-200'}`}>
                  <div className={`p-8 rounded-[2rem] mb-6 transition-all ${isUploading ? 'bg-slate-50' : 'bg-blue-50 text-blue-600 shadow-xl shadow-blue-100'}`}>{isUploading ? <div className="spinner" style={{width: '40px', height: '40px'}}></div> : <Icons.Cloud size={48}/>}</div>
                  <h3 className="text-2xl font-black text-slate-800 mb-3 tracking-tighter">{isUploading ? "전송 중..." : "PDF 또는 파일을 이곳에 끌어다 놓으세요"}</h3>
                  <label className="bg-[#1e293b] hover:bg-slate-800 text-white font-black px-12 py-4 rounded-[1.25rem] cursor-pointer transition-all active:scale-95 text-sm shadow-xl shadow-slate-200 mt-6">파일 탐색기<input type="file" className="hidden" onChange={(e) => uploadFile(e.target.files[0])} disabled={isUploading} /></label>
                </div>
                <div className="bg-white rounded-[3.5rem] shadow-2xl shadow-slate-200/40 border border-slate-50 overflow-hidden">
                  <div className="overflow-x-auto">
                    <table className="w-full text-left min-w-[600px]">
                      <thead className="bg-slate-50/50 border-b border-slate-100 text-[11px] font-black text-slate-400 uppercase tracking-widest">
                        <tr><th className="px-10 py-6">리소스 명칭</th><th className="px-10 py-6 text-center">용량</th><th className="px-10 py-6 text-center">날짜</th><th className="px-10 py-6 text-right">관리</th></tr>
                      </thead>
                      <tbody className="divide-y divide-slate-50">
                        {archives.map(item => (
                          <tr key={item.id} className="hover:bg-blue-50/40 transition-all group">
                            <td className="px-10 py-8 flex items-center gap-6 font-black text-xl text-slate-700 tracking-tighter"><Icons.File size={22} className="text-slate-200 group-hover:text-blue-500 transition-colors shadow-sm"/><span>{item.name}</span></td>
                            <td className="px-10 py-8 text-base text-slate-400 font-bold text-center tabular-nums">{item.size || 'N/A'}</td>
                            <td className="px-10 py-8 text-base text-slate-400 font-bold text-center uppercase tabular-nums">{new Date(item.createdAt).toLocaleDateString()}</td>
                            <td className="px-10 py-8 text-right"><div className="flex justify-end gap-5"><a href={item.url} target="_blank" rel="noreferrer" className="bg-blue-600 text-white hover:bg-blue-700 font-black text-[10px] px-8 py-3 rounded-xl transition-all shadow-lg shadow-blue-100 uppercase tracking-widest">View</a><button onClick={()=>confirm("삭제?") && db.doc(`artifacts/${appId}/users/${user.uid}/archives/${item.id}`).delete()} className="text-slate-200 hover:text-red-500 p-3"><Icons.Trash size={22}/></button></div></td>
                          </tr>
                        ))}
                      </tbody>
                    </table>
                  </div>
                </div>
              </div>
            )}
          </main>
        </div>
      );
    }

    const container = document.getElementById('root');
    const root = ReactDOM.createRoot(container);
    root.render(<App />);
  </script>
</body>
</html>
