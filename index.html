<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>태준실험실 - 전문 자료관리시스템</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="importmap">
    {
      "imports": {
        "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
        "firebase/auth": "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"
      }
    }
  </script>
</head>
<body class="bg-[#f8fafc] text-slate-800 font-sans antialiased">
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    import { initializeApp } from 'firebase/app';
    import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, signOut } from 'firebase/auth';
    import { getFirestore, collection, onSnapshot, doc, setDoc, deleteDoc, addDoc, query, orderBy } from 'firebase/firestore';

    const { useState, useEffect, useRef } = React;

    // --- UI Icons (Inline SVGs) ---
    const Icons = {
      Beaker: ({size=24, className=""}) => <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M4.5 3h15"/><path d="M6 3v16a2 2 0 0 0 2 2h8a2 2 0 0 0 2-2V3"/><path d="M6 14h12"/></svg>,
      FileText: ({size=20, className=""}) => <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><line x1="10" y1="9" x2="8" y2="9"/></svg>,
      Checklist: ({size=20, className=""}) => <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><path d="m9 12 2 2 4-4"/></svg>,
      Trash: ({size=18, className=""}) => <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>,
      LogOut: ({size=18, className=""}) => <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" x2="9" y1="12" y2="12"/></svg>,
      ChevronRight: ({size=16}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m9 18 6-6-6-6"/></svg>,
      Menu: ({size=24}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="4" x2="20" y1="12" y2="12"/><line x1="4" x2="20" y1="6" y2="6"/><line x1="4" x2="20" y1="18" y2="18"/></svg>
    };

    // --- Firebase Setup ---
    const firebaseConfig = {
      apiKey: "AIzaSyCfHF_0xj-9qdD-VcwDCv_gJtQhDtmvSXQ",
      authDomain: "taejun-lab.firebaseapp.com",
      projectId: "taejun-lab",
      storageBucket: "taejun-lab.firebasestorage.app",
      messagingSenderId: "1064401778915",
      appId: "1:1064401778915:web:0cf6b5bf131c0c75276dd6"
    };
    
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const appId = 'taejun-lab';

    function App() {
      const [user, setUser] = useState(null);
      const [loading, setLoading] = useState(true);
      const [loginId, setLoginId] = useState('');
      const [loginPw, setLoginPw] = useState('');
      const [errorMsg, setErrorMsg] = useState('');
      const [sidebarOpen, setSidebarOpen] = useState(false);

      const [activeTab, setActiveTab] = useState('checklist');
      const [archives, setArchives] = useState([]);
      const [notes, setNotes] = useState([]);
      const [weeklyChecklists, setWeeklyChecklists] = useState([]);
      const [selectedWeekId, setSelectedWeekId] = useState(null);

      useEffect(() => {
        const unsub = onAuthStateChanged(auth, (u) => { 
          setUser(u); 
          setLoading(false); 
        });
        return () => unsub();
      }, []);

      useEffect(() => {
        if (!user) return;
        const archivesRef = collection(db, 'artifacts', appId, 'users', user.uid, 'archives');
        const notesRef = collection(db, 'artifacts', appId, 'users', user.uid, 'notes');
        const checklistsRef = collection(db, 'artifacts', appId, 'users', user.uid, 'checklists');

        const unsubA = onSnapshot(archivesRef, (snap) => setArchives(snap.docs.map(d => ({ id: d.id, ...d.data() })).sort((a,b)=>b.createdAt - a.createdAt)));
        const unsubN = onSnapshot(notesRef, (snap) => setNotes(snap.docs.map(d => ({ id: d.id, ...d.data() })).sort((a,b)=>b.createdAt - a.createdAt)));
        const unsubC = onSnapshot(checklistsRef, (snap) => {
          const list = snap.docs.map(d => ({ id: d.id, ...d.data() })).sort((a,b)=>b.order - a.order);
          setWeeklyChecklists(list);
          if (list.length > 0 && !selectedWeekId) setSelectedWeekId(list[0].id);
        });

        return () => { unsubA(); unsubN(); unsubC(); };
      }, [user]);

      const handleLogin = async (e) => {
        e.preventDefault();
        setErrorMsg('');
        const finalEmail = loginId.includes('@') ? loginId : `${loginId}@taejun.lab`;
        try {
          await signInWithEmailAndPassword(auth, finalEmail, loginPw);
        } catch (err) {
          setErrorMsg("ID 또는 비밀번호가 올바르지 않습니다.");
        }
      };

      // --- Checklist Logic ---
      const addNewWeek = async () => {
        if (!user) return;
        const weekName = prompt("주차 정보를 입력하세요 (예: 4월 4주차)");
        if (!weekName) return;
        await addDoc(collection(db, 'artifacts', appId, 'users', user.uid, 'checklists'), {
          title: weekName,
          items: [{ id: 'item-1', text: '', completed: false, level: 0, bold: false }],
          createdAt: Date.now(),
          order: Date.now()
        });
      };

      const updateItems = async (weekId, newItems) => {
        if (!user) return;
        const docRef = doc(db, 'artifacts', appId, 'users', user.uid, 'checklists', weekId);
        await setDoc(docRef, { items: newItems }, { merge: true });
      };

      const handleItemChange = (weekId, index, field, value) => {
        const week = weeklyChecklists.find(w => w.id === weekId);
        const newItems = [...week.items];
        newItems[index][field] = value;
        updateItems(weekId, newItems);
      };

      const handleKeyDown = (e, weekId, index) => {
        const week = weeklyChecklists.find(w => w.id === weekId);
        let newItems = [...week.items];
        const item = newItems[index];

        if (e.key === 'Enter') {
          e.preventDefault();
          const newItem = { id: Math.random().toString(36).substr(2), text: '', completed: false, level: item.level, bold: false };
          newItems.splice(index + 1, 0, newItem);
          updateItems(weekId, newItems);
          setTimeout(() => document.getElementById(`input-${index + 1}`)?.focus(), 50);
        } else if (e.key === 'Tab') {
          e.preventDefault();
          if (!e.shiftKey) {
            if (item.level < 4) item.level += 1;
          } else {
            if (item.level > 0) item.level -= 1;
          }
          updateItems(weekId, newItems);
        } else if (e.key === 'Backspace' && item.text === '' && newItems.length > 1) {
          e.preventDefault();
          newItems.splice(index, 1);
          updateItems(weekId, newItems);
          setTimeout(() => document.getElementById(`input-${index - 1}`)?.focus(), 50);
        } else if (e.ctrlKey && (e.key === 'b' || e.key === 'B')) {
          e.preventDefault();
          item.bold = !item.bold;
          updateItems(weekId, newItems);
        }
      };

      if (loading) return <div className="h-screen flex items-center justify-center font-black text-blue-600 bg-slate-50 uppercase tracking-tighter text-2xl">Initializing Lab...</div>;

      if (!user) {
        return (
          <div className="min-h-screen bg-slate-100 flex items-center justify-center p-6">
            <div className="max-w-md w-full bg-white rounded-[2.5rem] shadow-2xl p-12 border border-white">
              <div className="flex justify-center mb-8">
                <div className="p-5 bg-blue-600 rounded-3xl shadow-xl shadow-blue-200">
                  <Icons.Beaker size={48} color="white"/>
                </div>
              </div>
              <h1 className="text-3xl font-black text-center text-slate-800 mb-2 tracking-tighter uppercase leading-none">Taejun Lab</h1>
              <p className="text-center text-slate-400 mb-12 text-xs font-bold tracking-[0.3em] uppercase">Private Access Only</p>
              
              <form onSubmit={handleLogin} className="space-y-8">
                <div className="space-y-2">
                  <label className="text-[10px] font-black text-slate-400 uppercase ml-2 tracking-widest">ID</label>
                  <input type="text" value={loginId} onChange={e=>setLoginId(e.target.value)} className="w-full bg-slate-50 border border-slate-100 rounded-2xl p-4.5 focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 outline-none transition-all font-bold" required />
                </div>
                <div className="space-y-2">
                  <label className="text-[10px] font-black text-slate-400 uppercase ml-2 tracking-widest">Security Key</label>
                  <input type="password" value={loginPw} onChange={e=>setLoginPw(e.target.value)} className="w-full bg-slate-50 border border-slate-100 rounded-2xl p-4.5 focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 outline-none transition-all font-bold" required />
                </div>
                {errorMsg && <div className="bg-red-50 text-red-500 text-xs text-center font-bold py-4 px-5 rounded-2xl animate-shake">{errorMsg}</div>}
                <button className="w-full bg-blue-600 hover:bg-blue-700 text-white font-black py-5 rounded-2xl transition-all shadow-xl shadow-blue-200 text-lg active:scale-95 uppercase tracking-widest">Login</button>
              </form>
            </div>
          </div>
        );
      }

      return (
        <div className="min-h-screen flex flex-col md:flex-row bg-[#f8fafc]">
          {/* Mobile Header */}
          <header className="md:hidden flex items-center justify-between p-5 bg-[#1e293b] text-white">
            <div className="flex items-center gap-2">
              <Icons.Beaker size={20} color="white"/>
              <span className="font-black text-lg uppercase tracking-tighter">Lab</span>
            </div>
            <button onClick={()=>setSidebarOpen(!sidebarOpen)} className="p-2 hover:bg-slate-700 rounded-lg">
              <Icons.Menu size={24}/>
            </button>
          </header>

          {/* Sidebar */}
          <aside className={`${sidebarOpen ? 'flex' : 'hidden'} md:flex fixed md:relative z-40 inset-0 md:inset-auto w-full md:w-72 bg-[#1e293b] text-white p-6 flex-col shadow-2xl`}>
            <div className="flex items-center justify-between mb-12">
              <div className="flex items-center gap-3">
                <div className="p-2 bg-blue-600 rounded-xl"><Icons.Beaker size={24} color="white"/></div>
                <h1 className="text-xl font-black tracking-tighter uppercase">Taejun Lab</h1>
              </div>
              <button onClick={()=>setSidebarOpen(false)} className="md:hidden p-2 text-slate-400"><Icons.Trash size={20}/></button>
            </div>
            
            <nav className="flex-1 space-y-2">
              <button onClick={()=>{setActiveTab('checklist'); setSidebarOpen(false);}} className={`w-full flex items-center gap-4 px-6 py-4.5 rounded-2xl transition-all font-bold ${activeTab === 'checklist' ? 'bg-blue-600 shadow-xl shadow-blue-900/20 text-white' : 'text-slate-400 hover:bg-slate-800'}`}>
                <Icons.Checklist size={20}/> <span>체크리스트</span>
              </button>
              <button onClick={()=>{setActiveTab('archives'); setSidebarOpen(false);}} className={`w-full flex items-center gap-4 px-6 py-4.5 rounded-2xl transition-all font-bold ${activeTab === 'archives' ? 'bg-blue-600 shadow-xl shadow-blue-900/20 text-white' : 'text-slate-400 hover:bg-slate-800'}`}>
                <Icons.FileText size={20}/> <span>자료 보관소</span>
              </button>
            </nav>

            <div className="mt-auto pt-8 border-t border-slate-700/50">
              <div className="flex items-center gap-4 px-3 mb-6">
                <div className="w-10 h-10 rounded-2xl bg-blue-500/20 flex items-center justify-center text-blue-400 font-black text-xs border border-blue-500/10">TJ</div>
                <div className="text-xs text-slate-400 font-bold truncate flex-1">{user.email.split('@')[0]}</div>
              </div>
              <button onClick={()=>signOut(auth)} className="w-full flex items-center justify-center gap-3 bg-slate-800/40 hover:bg-red-500/10 hover:text-red-400 text-slate-400 py-4.5 rounded-2xl transition-all text-[11px] font-black uppercase tracking-widest border border-slate-700/50">
                <Icons.LogOut size={14}/> Sign Out
              </button>
            </div>
          </aside>

          {/* Main Area */}
          <main className="flex-1 p-6 md:p-12 lg:p-20 overflow-y-auto">
            {activeTab === 'checklist' ? (
              <div className="max-w-4xl mx-auto">
                <div className="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-12">
                  <div>
                    <h2 className="text-4xl font-black text-slate-800 tracking-tighter">체크리스트</h2>
                    <p className="text-slate-400 mt-2 font-bold text-lg">주차별 업무 프로토콜 관리</p>
                  </div>
                  <button onClick={addNewWeek} className="bg-blue-600 hover:bg-blue-700 text-white font-black px-8 py-4 rounded-2xl shadow-xl shadow-blue-100 flex items-center gap-2 self-start transition-all active:scale-95">
                    <Icons.Plus size={20}/> 주차 추가
                  </button>
                </div>

                <div className="flex flex-wrap gap-2 mb-10">
                  {weeklyChecklists.map(week => (
                    <button 
                      key={week.id} 
                      onClick={()=>setSelectedWeekId(week.id)}
                      className={`px-6 py-3 rounded-2xl font-black text-sm transition-all border-2 ${selectedWeekId === week.id ? 'bg-[#1e293b] text-white border-[#1e293b]' : 'bg-white text-slate-400 border-slate-100 hover:border-slate-300'}`}
                    >
                      {week.title}
                    </button>
                  ))}
                </div>

                {selectedWeekId && weeklyChecklists.find(w => w.id === selectedWeekId) && (
                  <div className="bg-white rounded-[3rem] shadow-2xl shadow-slate-200/50 border border-slate-100 p-8 md:p-14 relative group">
                    <button 
                      onClick={async () => {
                        if(confirm("이 주차의 모든 데이터를 삭제할까요?")) {
                          await deleteDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'checklists', selectedWeekId));
                          setSelectedWeekId(null);
                        }
                      }}
                      className="absolute top-8 right-8 text-slate-200 hover:text-red-500 transition-all opacity-0 group-hover:opacity-100"
                    >
                      <Icons.Trash size={22}/>
                    </button>
                    
                    <h3 className="text-3xl font-black text-slate-800 mb-12 border-b-4 border-blue-600 inline-block pb-1">{weeklyChecklists.find(w => w.id === selectedWeekId).title}</h3>
                    
                    <div className="space-y-1">
                      {weeklyChecklists.find(w => w.id === selectedWeekId).items.map((item, idx) => (
                        <div key={item.id} className="flex items-start group/item transition-all" style={{ marginLeft: `${item.level * 32}px` }}>
                          <button 
                            onClick={() => handleItemChange(selectedWeekId, idx, 'completed', !item.completed)}
                            className={`mt-1.5 w-5 h-5 rounded-md border-2 flex items-center justify-center transition-all ${item.completed ? 'bg-blue-600 border-blue-600 text-white' : 'border-slate-200 bg-white hover:border-blue-400'}`}
                          >
                            {item.completed && <svg className="w-3.5 h-3.5 fill-current" viewBox="0 0 20 20"><path d="M0 11l2-2 5 5L18 3l2 2L7 18z"/></svg>}
                          </button>
                          <input 
                            id={`input-${idx}`}
                            type="text" 
                            value={item.text}
                            onChange={(e) => handleItemChange(selectedWeekId, idx, 'text', e.target.value)}
                            onKeyDown={(e) => handleKeyDown(e, selectedWeekId, idx)}
                            className={`flex-1 bg-transparent border-none outline-none px-4 py-1 text-lg transition-all ${item.completed ? 'text-slate-300 line-through font-medium' : 'text-slate-700 font-bold'} ${item.bold ? 'font-black' : ''}`}
                            placeholder="내용을 입력하세요..."
                            autoComplete="off"
                          />
                        </div>
                      ))}
                    </div>

                    <div className="mt-20 pt-8 border-t border-slate-50 flex items-center gap-6 text-[10px] font-black text-slate-300 uppercase tracking-widest">
                      <div className="flex items-center gap-1"><span className="bg-slate-100 px-1.5 py-0.5 rounded border border-slate-200 text-slate-500">Enter</span> 신규줄</div>
                      <div className="flex items-center gap-1"><span className="bg-slate-100 px-1.5 py-0.5 rounded border border-slate-200 text-slate-500">Tab</span> 하위항목</div>
                      <div className="flex items-center gap-1"><span className="bg-slate-100 px-1.5 py-0.5 rounded border border-slate-200 text-slate-500">Ctrl+B</span> 볼드</div>
                    </div>
                  </div>
                )}
              </div>
            ) : (
              <div className="max-w-6xl mx-auto">
                <div className="mb-14">
                  <h2 className="text-5xl font-black text-slate-800 tracking-tighter">자료 보관소</h2>
                  <p className="text-slate-400 mt-4 font-bold text-xl">실험 데이터 및 클라우드 자산 통합 관리</p>
                </div>

                <div className="bg-white rounded-[3rem] p-10 md:p-14 border border-slate-100 shadow-sm mb-12">
                  <form onSubmit={addArchive} className="flex flex-col lg:flex-row gap-6">
                    <input type="text" placeholder="자료 명칭" value={newFileName} onChange={e=>setNewFileName(e.target.value)} className="flex-1 bg-slate-50 border border-slate-100 rounded-2xl px-6 py-5 focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 outline-none font-bold" required />
                    <input type="url" placeholder="URL 링크" value={newFileUrl} onChange={e=>setNewFileUrl(e.target.value)} className="flex-[2] bg-slate-50 border border-slate-100 rounded-2xl px-6 py-5 focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 outline-none font-bold" required />
                    <button type="submit" className="bg-blue-600 hover:bg-blue-700 text-white font-black rounded-2xl px-12 py-5 shadow-xl shadow-blue-100 active:scale-95">자료 등록</button>
                  </form>
                </div>

                <div className="bg-white rounded-[3rem] shadow-sm border border-slate-200/60 overflow-hidden">
                  <table className="w-full text-left">
                    <thead className="bg-slate-50/50 border-b border-slate-100">
                      <tr>
                        <th className="px-10 py-6 text-[10px] font-black text-slate-400 uppercase tracking-widest">데이터 명칭</th>
                        <th className="px-10 py-6 text-[10px] font-black text-slate-400 uppercase tracking-widest text-center">등록일</th>
                        <th className="px-10 py-6 text-[10px] font-black text-slate-400 uppercase tracking-widest text-right">관리</th>
                      </tr>
                    </thead>
                    <tbody className="divide-y divide-slate-50 text-slate-700">
                      {archives.map(item => (
                        <tr key={item.id} className="hover:bg-blue-50/40 transition-all">
                          <td className="px-10 py-8 font-extrabold text-xl tracking-tight">{item.name}</td>
                          <td className="px-10 py-8 text-sm text-slate-400 font-bold text-center uppercase">{new Date(item.createdAt).toLocaleDateString()}</td>
                          <td className="px-10 py-8 text-right">
                            <div className="flex justify-end gap-5">
                              <a href={item.url} target="_blank" rel="noreferrer" className="bg-blue-50 text-blue-600 hover:bg-blue-600 hover:text-white font-black text-xs px-8 py-3.5 rounded-2xl transition-all border border-blue-100 uppercase tracking-widest active:scale-95">Open</a>
                              <button onClick={()=>confirm("삭제?") && deleteDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'archives', item.id))} className="text-slate-200 hover:text-red-500 transition-all"><Icons.Trash size={22}/></button>
                            </div>
                          </td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              </div>
            )}
          </main>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
  <style>
    @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }
    .animate-shake { animation: shake 0.3s ease-in-out; }
    ::-webkit-scrollbar { width: 10px; }
    ::-webkit-scrollbar-track { background: #f8fafc; }
    ::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 20px; border: 3px solid #f8fafc; }
    input:focus::placeholder { color: transparent; transition: color 0.2s ease; }
  </style>
</body>
</html>
