<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>태준실험실 - 전문 자료관리시스템</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="importmap">
    {
      "imports": {
        "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
        "firebase/auth": "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"
      }
    }
  </script>
</head>
<body class="bg-[#f8fafc] text-slate-800 font-sans">
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    import { initializeApp } from 'firebase/app';
    import { 
      getAuth, 
      onAuthStateChanged, 
      createUserWithEmailAndPassword, 
      signInWithEmailAndPassword, 
      signOut 
    } from 'firebase/auth';
    import { getFirestore, collection, onSnapshot, doc, setDoc, deleteDoc, addDoc, query, orderBy } from 'firebase/firestore';

    const { useState, useEffect, useRef } = React;

    // --- 아이콘 ---
    const Beaker = ({size=24, color="currentColor"}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M4.5 3h15"/><path d="M6 3v16a2 2 0 0 0 2 2h8a2 2 0 0 0 2-2V3"/><path d="M6 14h12"/></svg>;
    const FileText = ({size=20}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><line x1="10" y1="9" x2="8" y2="9"/></svg>;
    const ExternalLink = ({size=18}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>;
    const LogOut = ({size=18}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" x2="9" y1="12" y2="12"/></svg>;
    const Trash = ({size=18}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>;
    const Plus = ({size=18}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>;

    // --- Firebase 설정 ---
    const firebaseConfig = {
      apiKey: "AIzaSyCfHF_0xj-9qdD-VcwDCv_gJtQhDtmvSXQ",
      authDomain: "taejun-lab.firebaseapp.com",
      projectId: "taejun-lab",
      storageBucket: "taejun-lab.firebasestorage.app",
      messagingSenderId: "1064401778915",
      appId: "1:1064401778915:web:0cf6b5bf131c0c75276dd6"
    };
    
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const appId = 'taejun-lab';

    function App() {
      const [user, setUser] = useState(null);
      const [loading, setLoading] = useState(true);
      const [loginId, setLoginId] = useState('');
      const [loginPw, setLoginPw] = useState('');
      const [errorMsg, setErrorMsg] = useState('');
      const [authMode, setAuthMode] = useState('login'); 

      const [activeTab, setActiveTab] = useState('archives');
      const [archives, setArchives] = useState([]);
      const [notes, setNotes] = useState([]);

      const [newFileName, setNewFileName] = useState('');
      const [newFileUrl, setNewFileUrl] = useState('');
      const [newNoteTitle, setNewNoteTitle] = useState('');
      const [newNoteContent, setNewNoteContent] = useState('');

      useEffect(() => {
        const unsub = onAuthStateChanged(auth, (u) => { setUser(u); setLoading(false); });
        return () => unsub();
      }, []);

      useEffect(() => {
        if (!user) return;
        const archivesRef = collection(db, 'artifacts', appId, 'users', user.uid, 'archives');
        const notesRef = collection(db, 'artifacts', appId, 'users', user.uid, 'notes');

        const unsubA = onSnapshot(archivesRef, (snap) => {
          setArchives(snap.docs.map(d => ({ id: d.id, ...d.data() })).sort((a,b)=>b.createdAt - a.createdAt));
        }, (err) => console.error("Firestore Error:", err));

        const unsubN = onSnapshot(notesRef, (snap) => {
          setNotes(snap.docs.map(d => ({ id: d.id, ...d.data() })).sort((a,b)=>b.createdAt - a.createdAt));
        }, (err) => console.error("Firestore Error:", err));

        return () => { unsubA(); unsubN(); };
      }, [user]);

      const handleAuth = async (e) => {
        e.preventDefault();
        setErrorMsg('');

        if (!loginId.trim() || !loginPw.trim()) {
          setErrorMsg("정보를 모두 입력해 주세요.");
          return;
        }

        const finalEmail = loginId.includes('@') ? loginId : `${loginId}@taejun.lab`;
        const finalPw = loginPw;

        try {
          if (authMode === 'login') {
            await signInWithEmailAndPassword(auth, finalEmail, finalPw);
          } else {
            await createUserWithEmailAndPassword(auth, finalEmail, finalPw);
          }
        } catch (err) {
          console.error("Firebase Auth Error:", err.code);
          if (err.code === 'auth/operation-not-allowed') {
            setErrorMsg("설정 오류: 파이어베이스 콘솔에서 '이메일/비밀번호' 로그인을 활성화해야 합니다.");
          } else if (err.code === 'auth/user-not-found' || err.code === 'auth/invalid-credential' || err.code === 'auth/wrong-password') {
            setErrorMsg("아이디 또는 비밀번호가 일치하지 않습니다.");
          } else if (err.code === 'auth/email-already-in-use') {
            setErrorMsg("이미 사용 중인 아이디입니다. 로그인 모드에서 접속하세요.");
          } else if (err.code === 'auth/weak-password') {
            setErrorMsg("비밀번호는 최소 6자리여야 합니다.");
          } else {
            setErrorMsg("시스템 접속 실패: 네트워크 상태 혹은 파이어베이스 설정을 확인하세요.");
          }
        }
      };

      const addArchive = async (e) => {
        e.preventDefault();
        if(!newFileName || !newFileUrl || !user) return;
        try {
          await addDoc(collection(db, 'artifacts', appId, 'users', user.uid, 'archives'), {
            name: newFileName, url: newFileUrl, createdAt: Date.now()
          });
          setNewFileName(''); setNewFileUrl('');
        } catch (err) { alert("저장 실패: 파이어베이스 권한 설정을 확인하세요."); }
      };

      const addNote = async (e) => {
        e.preventDefault();
        if(!newNoteTitle.trim() || !user) return;
        try {
          await addDoc(collection(db, 'artifacts', appId, 'users', user.uid, 'notes'), {
            title: newNoteTitle, content: newNoteContent, createdAt: Date.now()
          });
          setNewNoteTitle(''); setNewNoteContent('');
        } catch (err) { alert("저장 실패: 데이터베이스 권한 설정을 확인하세요."); }
      };

      if (loading) return <div className="h-screen flex items-center justify-center font-bold text-blue-600 bg-[#f8fafc]">실험실 로딩 중...</div>;

      if (!user) {
        return (
          <div className="min-h-screen bg-[#f1f5f9] flex items-center justify-center p-6 font-sans">
            <div className="max-w-md w-full bg-white rounded-[2.5rem] shadow-2xl p-12 border border-white transition-all">
              <div className="flex justify-center mb-8">
                <div className="p-5 bg-blue-600 rounded-3xl shadow-xl shadow-blue-100">
                  <Beaker size={44} color="white"/>
                </div>
              </div>
              <h1 className="text-3xl font-black text-center text-slate-800 mb-2 tracking-tight">태준실험실</h1>
              <p className="text-center text-slate-400 mb-12 text-sm font-semibold tracking-tight uppercase">
                {authMode === 'login' ? 'System Access' : 'New Account'}
              </p>
              
              <form onSubmit={handleAuth} className="space-y-7">
                <div>
                  <label className="text-[10px] font-black text-slate-400 uppercase ml-2 tracking-[0.2em] mb-2 block tracking-widest">ID</label>
                  <input 
                    type="text" 
                    value={loginId} 
                    onChange={e=>setLoginId(e.target.value)} 
                    className="w-full bg-slate-50 border border-slate-100 rounded-2xl p-4 focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 outline-none transition-all font-bold" 
                    required 
                  />
                </div>
                <div>
                  <label className="text-[10px] font-black text-slate-400 uppercase ml-2 tracking-[0.2em] mb-2 block tracking-widest">Password</label>
                  <input 
                    type="password" 
                    value={loginPw} 
                    onChange={e=>setLoginPw(e.target.value)} 
                    className="w-full bg-slate-50 border border-slate-100 rounded-2xl p-4 focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 outline-none transition-all font-bold" 
                    required 
                  />
                </div>
                
                {errorMsg && (
                  <div className="bg-red-50 border border-red-100 text-red-600 text-[11px] text-center font-bold py-4 px-5 rounded-2xl animate-shake leading-relaxed">
                    {errorMsg}
                  </div>
                )}

                <button className="w-full bg-blue-600 hover:bg-blue-700 text-white font-black py-4.5 rounded-2xl transition-all shadow-xl shadow-blue-200 text-lg active:scale-[0.98] mt-4 uppercase tracking-widest">
                  {authMode === 'login' ? 'Login' : 'Register'}
                </button>
              </form>

              <div className="mt-10 text-center">
                <button 
                  onClick={() => { setAuthMode(authMode === 'login' ? 'signup' : 'login'); setErrorMsg(''); }}
                  className="text-xs font-bold text-slate-400 hover:text-blue-600 transition-all underline underline-offset-8 decoration-slate-200 hover:decoration-blue-400"
                >
                  {authMode === 'login' ? '연구원 등록이 필요하신가요?' : '이미 계정이 있나요? 로그인하기'}
                </button>
              </div>
            </div>
          </div>
        );
      }

      return (
        <div className="min-h-screen flex flex-col md:flex-row font-sans">
          <aside className="w-full md:w-72 bg-[#1e293b] text-white p-6 flex flex-col shadow-2xl z-10">
            <div className="flex items-center gap-3 mb-12 px-2">
              <div className="p-2.5 bg-blue-600 rounded-xl shadow-lg shadow-blue-900/20"><Beaker size={26} color="white"/></div>
              <h1 className="text-xl font-black tracking-tight uppercase">Taejun <span className="text-blue-400 font-medium italic">Lab</span></h1>
            </div>
            
            <nav className="flex-1 space-y-2.5">
              <button onClick={()=>setActiveTab('archives')} className={`w-full flex items-center gap-4 px-5 py-4 rounded-2xl transition-all font-bold ${activeTab === 'archives' ? 'bg-blue-600 shadow-xl shadow-blue-900/20 text-white' : 'text-slate-400 hover:bg-slate-800'}`}>
                <FileText size={20}/> <span>자료 보관소</span>
              </button>
              <button onClick={()=>setActiveTab('notes')} className={`w-full flex items-center gap-4 px-5 py-4 rounded-2xl transition-all font-bold ${activeTab === 'notes' ? 'bg-blue-600 shadow-xl shadow-blue-900/20 text-white' : 'text-slate-400 hover:bg-slate-800'}`}>
                <Beaker size={20} color="currentColor"/> <span>업무 일지</span>
              </button>
            </nav>

            <div className="mt-auto pt-8 border-t border-slate-700/50">
              <div className="flex items-center gap-4 px-3 mb-6">
                <div className="w-10 h-10 rounded-2xl bg-blue-500/20 flex items-center justify-center text-blue-400 font-black text-xs border border-blue-500/10">TJ</div>
                <div className="text-xs text-slate-400 font-bold truncate flex-1 tracking-tight">{user.email.split('@')[0]}</div>
              </div>
              <button onClick={()=>signOut(auth)} className="w-full flex items-center justify-center gap-3 bg-slate-800/40 hover:bg-red-500/10 hover:text-red-400 text-slate-400 py-4.5 rounded-2xl transition-all text-[11px] font-black uppercase tracking-[0.2em] border border-slate-700/50 active:scale-95">
                <LogOut size={14}/> Sign Out
              </button>
            </div>
          </aside>

          <main className="flex-1 p-6 md:p-14 overflow-y-auto bg-[#f8fafc]">
            {activeTab === 'archives' ? (
              <div className="max-w-6xl mx-auto">
                <div className="mb-14">
                  <h2 className="text-4xl font-black text-slate-800 tracking-tight">자료 보관소</h2>
                  <p className="text-slate-400 mt-3 font-bold text-lg">주요 서류 및 업무 링크를 안전하게 관리합니다.</p>
                </div>

                <div className="bg-white rounded-[3rem] shadow-sm border border-slate-200/60 p-12 mb-12">
                  <h3 className="text-[10px] font-black text-slate-300 mb-8 uppercase tracking-[0.4em]">신규 데이터 등록</h3>
                  <form onSubmit={addArchive} className="flex flex-col lg:flex-row gap-6">
                    <input type="text" placeholder="자료 명칭" value={newFileName} onChange={e=>setNewFileName(e.target.value)} className="flex-1 bg-slate-50 border border-slate-100 rounded-2xl px-6 py-5 focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 outline-none transition-all font-bold shadow-inner" required />
                    <input type="url" placeholder="구글 드라이브 / URL 링크" value={newFileUrl} onChange={e=>setNewFileUrl(e.target.value)} className="flex-[2] bg-slate-50 border border-slate-100 rounded-2xl px-6 py-5 focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 outline-none transition-all font-bold shadow-inner" required />
                    <button type="submit" className="bg-blue-600 hover:bg-blue-700 text-white font-black rounded-2xl px-12 py-5 transition-all shadow-xl shadow-blue-100 flex items-center justify-center gap-3 active:scale-95 whitespace-nowrap">
                      <Plus size={22}/> 데이터 등록
                    </button>
                  </form>
                </div>

                <div className="bg-white rounded-[3rem] shadow-sm border border-slate-200/60 overflow-hidden">
                  <table className="w-full text-left">
                    <thead className="bg-slate-50/50 border-b border-slate-100">
                      <tr>
                        <th className="px-12 py-7 text-[10px] font-black text-slate-400 uppercase tracking-widest">명칭</th>
                        <th className="px-12 py-7 text-[10px] font-black text-slate-400 uppercase tracking-widest text-center">등록일</th>
                        <th className="px-12 py-7 text-[10px] font-black text-slate-400 uppercase tracking-widest text-right">관리</th>
                      </tr>
                    </thead>
                    <tbody className="divide-y divide-slate-50">
                      {archives.map(item => (
                        <tr key={item.id} className="hover:bg-blue-50/40 transition-all group">
                          <td className="px-12 py-8 text-xl font-extrabold text-slate-700 tracking-tight leading-none">{item.name}</td>
                          <td className="px-12 py-8 text-sm text-slate-400 font-bold text-center tracking-tighter uppercase">{new Date(item.createdAt).toLocaleDateString()}</td>
                          <td className="px-12 py-8 text-right">
                            <div className="flex justify-end gap-5">
                              <a href={item.url} target="_blank" rel="noreferrer" className="flex items-center gap-2 text-blue-600 hover:text-white hover:bg-blue-600 font-black text-[11px] bg-blue-50 px-8 py-3.5 rounded-2xl transition-all border border-blue-100 shadow-sm active:scale-[0.92] uppercase tracking-wider">
                                Open Link
                              </a>
                              <button onClick={()=>confirm("이 자료를 영구 삭제하시겠습니까?") && deleteDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'archives', item.id))} className="text-slate-200 hover:text-red-500 p-3 transition-all active:rotate-12">
                                <Trash size={22}/>
                              </button>
                            </div>
                          </td>
                        </tr>
                      ))}
                      {archives.length === 0 && (
                        <tr><td colSpan="3" className="px-12 py-48 text-center text-slate-300 font-bold text-xl italic tracking-tighter">데이터가 없습니다.</td></tr>
                      )}
                    </tbody>
                  </table>
                </div>
              </div>
            ) : (
              <div className="max-w-5xl mx-auto">
                <div className="mb-14">
                  <h2 className="text-4xl font-black text-slate-800 tracking-tight">업무 일지</h2>
                  <p className="text-slate-400 mt-3 font-bold text-lg">업무 기록과 실험 로그를 보관합니다.</p>
                </div>

                <div className="bg-white rounded-[3rem] shadow-sm border border-slate-200/60 p-12 mb-12">
                  <form onSubmit={addNote} className="space-y-6">
                    <input type="text" placeholder="제목" value={newNoteTitle} onChange={e=>setNewNoteTitle(e.target.value)} className="w-full bg-slate-50 border border-slate-100 rounded-2xl px-8 py-5 focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 outline-none font-black text-xl shadow-inner" required />
                    <textarea placeholder="연구 로그 기록..." value={newNoteContent} onChange={e=>setNewNoteContent(e.target.value)} rows="6" className="w-full bg-slate-50 border border-slate-100 rounded-2xl px-8 py-6 focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 outline-none font-bold shadow-inner text-lg" />
                    <div className="flex justify-end">
                      <button type="submit" className="bg-blue-600 hover:bg-blue-700 text-white font-black rounded-2xl px-14 py-5 shadow-xl shadow-blue-100 active:scale-95">저장</button>
                    </div>
                  </form>
                </div>

                <div className="grid gap-8 md:grid-cols-2">
                  {notes.map(note => (
                    <div key={note.id} className="bg-white border border-slate-200 rounded-[3rem] p-12 shadow-sm group hover:border-blue-300 transition-all hover:shadow-2xl relative">
                      <div className="flex justify-between items-start mb-8">
                        <h3 className="font-black text-slate-800 text-2xl tracking-tighter leading-tight flex-1 pr-6">{note.title}</h3>
                        <button onClick={()=>confirm("삭제하시겠습니까?") && deleteDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'notes', note.id))} className="text-slate-100 group-hover:text-red-400 transition-all p-2"><Trash size={22}/></button>
                      </div>
                      <p className="text-slate-500 leading-relaxed font-bold whitespace-pre-wrap mb-14 text-lg">{note.content}</p>
                      <div className="absolute bottom-12 left-12 text-[10px] font-black text-slate-300 uppercase tracking-widest bg-slate-50 px-5 py-2.5 rounded-2xl border border-slate-100">{new Date(note.createdAt).toLocaleString()}</div>
                    </div>
                  ))}
                </div>
              </div>
            )}
          </main>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
  <style>
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-5px); }
      75% { transform: translateX(5px); }
    }
    .animate-shake { animation: shake 0.3s ease-in-out; }
    ::-webkit-scrollbar { width: 10px; }
    ::-webkit-scrollbar-track { background: #f8fafc; }
    ::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 20px; border: 3px solid #f8fafc; }
  </style>
</body>
</html>
